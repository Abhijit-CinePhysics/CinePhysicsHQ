"use strict";

/* Utilities */
class Utils {
  /** Returns the current worksheet id from the URL query string. */
  static getWorksheetId() {
    return new URLSearchParams(window.location.search).get("id")?.trim() || "";
  }

  /** Produces a safe text value for API fields that may be missing or malformed. */
  static text(value, fallback = "Not specified") {
    return typeof value === "string" && value.trim() ? value.trim() : fallback;
  }

  /** Produces a safe number-like label for API fields that may be missing. */
  static count(value, fallback = "Not specified") {
    return Number.isFinite(Number(value)) && Number(value) >= 0 ? String(Number(value)) : fallback;
  }

  /** Parses a date value and returns a reader-friendly label. */
  static date(value) {
    const date = value ? new Date(value) : null;
    if (!date || Number.isNaN(date.getTime())) return "Not specified";
    return new Intl.DateTimeFormat("en", { year: "numeric", month: "short", day: "numeric" }).format(date);
  }

  /** Estimates reading minutes from plain text content. */
  static readingTime(html) {
    const text = Utils.htmlToText(html);
    const words = text.split(/\s+/).filter(Boolean).length;
    const minutes = Math.max(1, Math.ceil(words / 220));
    return `${minutes} min read`;
  }

  /** Converts HTML into plain text without executing scripts. */
  static htmlToText(html) {
    const doc = new DOMParser().parseFromString(String(html || ""), "text/html");
    return doc.body.textContent || "";
  }

  /** Creates a stable slug from heading text. */
  static slug(text, index) {
    const base = String(text || "section").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    return `${base || "section"}-${index}`;
  }

  /** Debounces frequent UI work to reduce layout churn. */
  static debounce(callback, delay = 120) {
    let timer = 0;
    return (...args) => {
      window.clearTimeout(timer);
      timer = window.setTimeout(() => callback(...args), delay);
    };
  }

  /** Safely writes plain text into a DOM node. */
  static setText(node, value) {
    if (node) node.textContent = value;
  }

  /** Creates an element with optional class names and text content. */
  static el(tag, className = "", text = "") {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text) node.textContent = text;
    return node;
  }

  /** Returns true when worksheet HTML includes TeX-style math delimiters. */
  static needsMathJax(content) {
    return /\\\(|\\\[|\$\$/.test(String(content || ""));
  }

  /** Normalizes a string for case-insensitive matching. */
  static key(value) {
    return Utils.text(value, "").toLowerCase();
  }

  /** Escapes text for use in a regular expression. */
  static escapeRegExp(value) {
    return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  /** Produces a safe download filename for worksheet exports. */
  static filename(data, id) {
    const parts = [data.className, data.chapter, data.title || id]
      .map((part) => Utils.text(part, "").replace(/[^a-z0-9]+/gi, ""))
      .filter(Boolean);
    return `${parts.join("-") || `Worksheet-${id}`}.pdf`;
  }
}

class Analytics {

/* Storage */
class StorageService {
  /** Reads a JSON value from localStorage without throwing. */
  static get(key, fallback = null) {
    try {
      const raw = window.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      return fallback;
    }
  }

  /** Writes a JSON value to localStorage without interrupting the UI. */
  static set(key, value) {
    try {
      window.localStorage.setItem(key, JSON.stringify(value));
    } catch {
      return false;
    }
    return true;
  }

  /** Returns the cache key for a worksheet id. */
  static worksheetKey(id) {
    return `worksheet_${id}`;
  }

  /** Returns the reading position key for a worksheet id. */
  static scrollKey(id) {
    return `worksheet_scroll_${id}`;
  }

  /** Reads a cached worksheet payload by id. */
  static getWorksheet(id) {
    return StorageService.get(StorageService.worksheetKey(id));
  }

  /** Saves a worksheet payload by id. */
  static setWorksheet(id, data) {
    return StorageService.set(StorageService.worksheetKey(id), { data, cachedAt: Date.now() });
  }

  /** Lists cached worksheets for fallback related content discovery. */
  static listWorksheets() {
    const items = [];
    for (let index = 0; index < window.localStorage.length; index += 1) {
      const key = window.localStorage.key(index);
      if (key && key.startsWith("worksheet_") && !key.startsWith("worksheet_scroll_")) {
        const item = StorageService.get(key);
        if (item?.data) items.push(item.data);
      }
    }
    return items;
  }

  /** Saves the current scroll position for a worksheet. */
  static setScroll(id, position) {
    return StorageService.set(StorageService.scrollKey(id), { position, savedAt: Date.now() });
  }

  /** Reads the saved scroll position for a worksheet. */
  static getScroll(id) {
    return StorageService.get(StorageService.scrollKey(id));
  }

  /** Reads the saved bookmark id list. */
  static bookmarks() {
    return StorageService.get("cinephysics_bookmarks", []);
  }

  /** Checks whether a worksheet id is bookmarked. */
  static isBookmarked(id) {
    return StorageService.bookmarks().includes(id);
  }

  /** Toggles a worksheet bookmark and returns the new state. */
  static toggleBookmark(id) {
    const bookmarks = StorageService.bookmarks();
    const next = bookmarks.includes(id) ? bookmarks.filter((item) => item !== id) : [...bookmarks, id];
    StorageService.set("cinephysics_bookmarks", next);
    return next.includes(id);
  }
}

/* API */
class WorksheetAPI {
  /** Selects the correct API origin for development or production. */
  static origin() {
    const isLocal = ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
    return isLocal ? "http://localhost:3000" : "https://cinephysics-api.vercel.app";
  }

  /** Builds a fully qualified API URL. */
  static url(path, params = {}) {
    const url = new URL(path, WorksheetAPI.origin());
    Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
    return url.href;
  }

  /** Fetches JSON with timeout and abort support. */
  static async fetchJSON(url, timeoutMs = 10000) {
    const controller = new AbortController();
    const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
    try {
      const response = await fetch(url, { signal: controller.signal, headers: { Accept: "application/json" } });
      if (response.status === 404) throw new WorksheetError("Worksheet not found", "not-found");
      if (!response.ok) throw new WorksheetError("Server error", "server");
      return await response.json();
    } catch (error) {
      if (error.name === "AbortError") throw new WorksheetError("Server timeout", "timeout");
      if (!navigator.onLine) throw new WorksheetError("Offline mode", "offline");
      if (error instanceof WorksheetError) throw error;
      throw new WorksheetError("Unable to load worksheet", "network");
    } finally {
      window.clearTimeout(timeout);
    }
  }

  /** Fetches a worksheet by id. */
  static fetchWorksheet(id) {
    return WorksheetAPI.fetchJSON(WorksheetAPI.url("/api/worksheet", { id }));
  }

  /** Fetches the worksheet library for API-backed related worksheets. */
  static fetchWorksheets() {
    return WorksheetAPI.fetchJSON(WorksheetAPI.url("/api/worksheets"), 8000);
  }

  /** Fetches backend worksheet statistics when the endpoint is available. */
  static fetchStats(id) {
    return WorksheetAPI.fetchJSON(WorksheetAPI.url("/api/worksheet/stats", { id }), 6000);
  }

  /** Sends a backend metric event without blocking the UI. */
  static trackMetric(id, event) {
    fetch(WorksheetAPI.url("/api/worksheet/stats", { id }), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ event }),
      keepalive: true
    }).catch(() => {});
  }
}

/* Error type */
class WorksheetError extends Error {
  /** Creates a typed worksheet loading error. */
  constructor(message, code) {
    super(message);
    this.code = code;
  }
}

/* Security */
class Sanitizer {
  /** Sanitizes trusted worksheet HTML with DOMPurify when available and a strict fallback otherwise. */
  static worksheetHTML(html) {
    const dirty = String(html || "");
    if (window.DOMPurify?.sanitize) {
      return window.DOMPurify.sanitize(dirty, {
        USE_PROFILES: { html: true },
        ADD_TAGS: ["mjx-container"],
        ADD_ATTR: ["aria-label", "aria-hidden", "role", "data-question-number"],
        FORBID_TAGS: ["script", "iframe", "object", "embed", "form", "input", "button"],
        FORBID_ATTR: ["srcdoc"]
      });
    }
    const doc = new DOMParser().parseFromString(dirty, "text/html");
    doc.querySelectorAll("script, iframe, object, embed, form, input, button, link[rel='import']").forEach((node) => node.remove());
    doc.querySelectorAll("*").forEach((node) => {
      [...node.attributes].forEach((attr) => {
        const name = attr.name.toLowerCase();
        const value = attr.value.trim().toLowerCase();
        if (name.startsWith("on") || value.startsWith("javascript:") || value.startsWith("data:text/html") || name === "srcdoc") {
          node.removeAttribute(attr.name);
        }
      });
    });
    return doc.body.innerHTML;
  }
}

/* SEO */
class SEOManager {
  /** Updates document metadata, social tags, canonical URL, and JSON-LD. */
  static update(data, id) {
    const title = `${Utils.text(data.title, "Worksheet")} | CinePhysicsHQ`;
    const description = `${Utils.text(data.className, "Class")} ${Utils.text(data.chapter, "chapter")} worksheet with ${Utils.count(data.questionCount, "multiple")} questions.`;
    const url = new URL(window.location.href);
    url.searchParams.set("id", id);

    document.title = title;
    SEOManager.setMeta("name", "description", description);
    SEOManager.setMeta("property", "og:title", title);
    SEOManager.setMeta("property", "og:description", description);
    SEOManager.setMeta("property", "og:url", url.href);
    SEOManager.setMeta("name", "twitter:title", title);
    SEOManager.setMeta("name", "twitter:description", description);
    SEOManager.setCanonical(url.href);
    SEOManager.setJsonLd(data, url.href);
  }

  /** Sets or creates a meta tag by attribute and value. */
  static setMeta(attribute, key, content) {
    let node = document.head.querySelector(`meta[${attribute}="${key}"]`);
    if (!node) {
      node = document.createElement("meta");
      node.setAttribute(attribute, key);
      document.head.appendChild(node);
    }
    node.setAttribute("content", content);
  }

  /** Sets the canonical link href. */
  static setCanonical(href) {
    const node = document.head.querySelector("link[rel='canonical']");
    if (node) node.setAttribute("href", href);
  }

  /** Writes JSON-LD for educational worksheet search context. */
  static setJsonLd(data, url) {
    document.getElementById("worksheet-jsonld")?.remove();
    const script = document.createElement("script");
    script.id = "worksheet-jsonld";
    script.type = "application/ld+json";
    script.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "EducationalCreativeWork",
      name: Utils.text(data.title, "CinePhysicsHQ Worksheet"),
      educationalLevel: Utils.text(data.className, "School"),
      about: Utils.text(data.chapter, "Physics"),
      learningResourceType: "Worksheet",
      datePublished: data.generatedAt || undefined,
      url
    });
    document.head.appendChild(script);
  }
}

/* PDF */
class PDFService {
  /** Exports the worksheet through html2pdf.js when present or loaded, then falls back to print. */
  static async export(app) {
    Analytics.track("worksheet_download", { worksheet_id: app.id });
    WorksheetAPI.trackMetric(app.id, "download");
    try {
      await PDFService.ensureLibrary();
      if (!window.html2pdf) throw new Error("PDF library unavailable");
      const wrapper = PDFService.createPrintableClone(app);
      await window.html2pdf()
        .set({
          margin: [16, 12, 18, 12],
          filename: Utils.filename(app.data || {}, app.id),
          image: { type: "jpeg", quality: 0.96 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
          pagebreak: { mode: ["css", "legacy"], avoid: ["tr", "figure", "mjx-container"] }
        })
        .from(wrapper)
        .save();
      wrapper.remove();
    } catch {
      window.print();
    }
  }

  /** Loads html2pdf.js on demand for real PDF downloads. */
  static ensureLibrary() {
    if (window.html2pdf) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const existing = document.querySelector("script[data-html2pdf]");
      if (existing) {
        existing.addEventListener("load", resolve, { once: true });
        existing.addEventListener("error", reject, { once: true });
        return;
      }
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js";
      script.async = true;
      script.dataset.html2pdf = "true";
      script.addEventListener("load", resolve, { once: true });
      script.addEventListener("error", reject, { once: true });
      document.head.appendChild(script);
    });
  }

  /** Creates a branded clone for PDF export without mutating the reader view. */
  static createPrintableClone(app) {
    const wrapper = Utils.el("section", "pdf-export");
    const header = Utils.el("header", "pdf-export__header");
    header.append(Utils.el("strong", "", "CinePhysicsHQ"), Utils.el("span", "", Utils.text(app.data?.title, "Worksheet")));
    const content = app.content.cloneNode(true);
    const footer = Utils.el("footer", "pdf-export__footer", "CinePhysicsHQ worksheet export");
    wrapper.append(header, content, footer);
    document.body.appendChild(wrapper);
    return wrapper;
  }
}

/* Rendering */
class WorksheetRenderer {
  /** Creates a renderer bound to the document UI. */
  constructor(app) {
    this.app = app;
    this.headingObserver = null;
    this.imageObserver = null;
    this.questionObserver = null;
  }

  /** Renders worksheet metadata and content. */
  render(data, fromCache = false) {
    this.app.data = data;
    this.app.search.clear(false);
    this.renderHero(data);
    this.renderContent(data);
    this.renderTOC();
    this.renderQuestions();
    this.app.applyReaderPrefs();
    this.app.updateBookmarkState();
    SEOManager.update(data, this.app.id);
    this.app.status.hidden = true;
    this.app.card.hidden = false;
    this.app.card.classList.add("fade-in");
    if (!fromCache) StorageService.setWorksheet(this.app.id, data);
    if (Utils.needsMathJax(data.content)) this.loadMathJax();
    this.app.loadRelated(data);
    this.app.loadStats();
    this.app.offerResume();
  }

  /** Renders the hero title and stat chips with escaped text only. */
  renderHero(data, stats = null) {
    Utils.setText(this.app.title, Utils.text(data.title, "Untitled worksheet"));
    Utils.setText(this.app.classLabel, Utils.text(data.className, "Class not specified"));
    const items = [
      ["Class", Utils.text(data.className)],
      ["Chapter", Utils.text(data.chapter)],
      ["Board", Utils.text(data.board)],
      ["Difficulty", Utils.text(data.difficulty), true],
      ["Questions", Utils.count(data.questionCount)],
      ["Estimated Time", Utils.text(data.estimatedTime)],
      ["Published", Utils.date(data.generatedAt)],
      ["Reading Time", Utils.readingTime(data.content)]
    ];
    if (stats) {
      items.push(["Views", Utils.count(stats.views, "0")], ["Downloads", Utils.count(stats.downloads, "0")], ["Likes", Utils.count(stats.likes, "0")]);
    }
    const fragment = document.createDocumentFragment();
    items.forEach(([label, value, badge]) => {
      const chip = Utils.el("div", badge ? "meta-chip meta-chip--badge" : "meta-chip");
      chip.append(Utils.el("span", "", label), Utils.el("strong", "", value));
      fragment.appendChild(chip);
    });
    this.app.meta.replaceChildren(fragment);
  }

  /** Sanitizes and renders worksheet HTML in the content surface. */
  renderContent(data) {
    this.app.content.innerHTML = Sanitizer.worksheetHTML(data.content || "<p>Worksheet content is unavailable.</p>");
    this.prepareContentImages();
    this.prepareTables();
  }

  /** Wraps wide tables and preserves header repetition for print/PDF. */
  prepareTables() {
    [...this.app.content.querySelectorAll("table")].forEach((table) => {
      if (!table.parentElement?.classList.contains("table-scroll")) {
        const wrapper = Utils.el("div", "table-scroll");
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      }
      if (!table.querySelector("thead")) {
        const firstRow = table.querySelector("tr");
        if (firstRow?.querySelector("th")) {
          const thead = document.createElement("thead");
          thead.appendChild(firstRow);
          table.insertBefore(thead, table.firstChild);
        }
      }
    });
  }

  /** Builds a table of contents from h2 and h3 headings. */
  renderTOC() {
    const headings = [...this.app.content.querySelectorAll("h2, h3")];
    if (!headings.length) {
      this.app.toc.hidden = true;
      this.app.tocList.replaceChildren();
      return;
    }
    const fragment = document.createDocumentFragment();
    headings.forEach((heading, index) => {
      if (!heading.id) heading.id = Utils.slug(heading.textContent, index);
      const item = document.createElement("li");
      const link = document.createElement("a");
      link.href = `#${heading.id}`;
      link.dataset.level = heading.tagName === "H3" ? "3" : "2";
      link.textContent = heading.textContent || `Section ${index + 1}`;
      item.appendChild(link);
      fragment.appendChild(item);
    });
    this.app.tocList.replaceChildren(fragment);
    this.app.toc.hidden = false;
    this.app.toc.classList.add("fade-in");
    this.observeHeadings(headings);
  }

  /** Detects numbered questions and creates a question navigator and AI buttons. */
  renderQuestions() {
    const candidates = [...this.app.content.querySelectorAll("p, li, h2, h3, h4")];
    const seen = new Set();
    const questions = [];
    
    candidates.forEach((node) => {
      const text = (node.textContent || "").trim();
      const match = text.match(/^(?:Q(?:uestion)?\.?\s*)?(\d{1,3})(?:[\).:-]|\s+)\s*/i);
      if (!match || seen.has(match[1])) return;
      
      seen.add(match[1]);
      node.classList.add("question-anchor");
      node.id = node.id || `question-${match[1]}`;
      questions.push({ id: node.id, label: `Question ${match[1]}` });

      // Inject the AI button directly into the DOM next to the question text
      const aiBtn = Utils.el("button", "ai-btn-inline", "🤖 Ask AI");
      aiBtn.type = "button";
      aiBtn.dataset.questionText = text; // Store the text for the AI context
      node.appendChild(aiBtn);
    });

    if (!questions.length) {
      this.app.questions.hidden = true;
      this.app.questionsList.replaceChildren();
      return;
    }
    const fragment = document.createDocumentFragment();
    questions.forEach((question) => {
      const item = document.createElement("li");
      const link = document.createElement("a");
      link.href = `#${question.id}`;
      link.textContent = question.label;
      item.appendChild(link);
      fragment.appendChild(item);
    });
    this.app.questionsList.replaceChildren(fragment);
    this.app.questions.hidden = false;
    this.observeQuestions(candidates.filter((node) => node.classList.contains("question-anchor")));
  }

  /** Renders related worksheets from an API result or cached fallback. */
  renderRelated(data, worksheets) {
    const related = worksheets
      .filter((item) => Utils.text(item.worksheetId || item.id, "") !== this.app.id)
      .filter((item) => Utils.key(item.className) === Utils.key(data.className))
      .filter((item) => Utils.key(item.chapter) === Utils.key(data.chapter))
      .sort((a, b) => new Date(b.generatedAt || b.createdAt || 0) - new Date(a.generatedAt || a.createdAt || 0))
      .slice(0, 4);
    if (!related.length) {
      this.app.related.hidden = true;
      this.app.relatedList.replaceChildren();
      return;
    }
    const fragment = document.createDocumentFragment();
    related.forEach((item) => {
      const id = Utils.text(item.worksheetId || item.id, "");
      const link = Utils.el("a", "related-card");
      link.href = `worksheet.html?id=${encodeURIComponent(id)}`;
      link.append(
        Utils.el("strong", "", Utils.text(item.title, "Untitled worksheet")),
        Utils.el("span", "", `${Utils.text(item.className)} - ${Utils.text(item.chapter)}`),
        Utils.el("span", "", Utils.date(item.generatedAt || item.createdAt))
      );
      fragment.appendChild(link);
    });
    this.app.relatedList.replaceChildren(fragment);
    this.app.related.hidden = false;
    this.app.related.classList.add("fade-in");
  }

  /** Adds lazy loading and safe alt text to worksheet images. */
  prepareContentImages() {
    const images = [...this.app.content.querySelectorAll("img")];
    images.forEach((image, index) => {
      image.loading = "lazy";
      image.decoding = "async";
      if (!image.getAttribute("alt")) image.setAttribute("alt", `Worksheet illustration ${index + 1}`);
    });
    if ("IntersectionObserver" in window) {
      this.imageObserver?.disconnect();
      this.imageObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("fade-in");
            this.imageObserver.unobserve(entry.target);
          }
        });
      }, { rootMargin: "180px" });
      images.forEach((image) => this.imageObserver.observe(image));
    }
  }

  /** Highlights the current heading as readers scroll. */
  observeHeadings(headings) {
    this.headingObserver?.disconnect();
    const links = [...this.app.tocList.querySelectorAll("a")];
    this.headingObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          links.forEach((link) => link.classList.toggle("is-active", link.hash === `#${entry.target.id}`));
        }
      });
    }, { rootMargin: "-18% 0px -70% 0px", threshold: 0.01 });
    headings.forEach((heading) => this.headingObserver.observe(heading));
  }

  /** Highlights the current question as readers scroll. */
  observeQuestions(questions) {
    this.questionObserver?.disconnect();
    const links = [...this.app.questionsList.querySelectorAll("a")];
    this.questionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          links.forEach((link) => link.classList.toggle("is-active", link.hash === `#${entry.target.id}`));
        }
      });
    }, { rootMargin: "-18% 0px -70% 0px", threshold: 0.01 });
    questions.forEach((question) => this.questionObserver.observe(question));
  }

  /** Lazy loads MathJax only when math delimiters are present. */
  loadMathJax() {
    if (window.MathJax?.typesetPromise) {
      window.MathJax.typesetPromise([this.app.content]);
      return;
    }
    window.MathJax = { tex: { inlineMath: [["\\(", "\\)"]], displayMath: [["\\[", "\\]"], ["$$", "$$"]] } };
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js";
    script.async = true;
    document.head.appendChild(script);
  }
}

/* Search */
class WorksheetSearch {
  /** Creates a search controller for the worksheet content. */
  constructor(app) {
    this.app = app;
    this.marks = [];
    this.activeIndex = -1;
  }

  /** Opens the search panel and focuses the input. */
  open() {
    this.app.searchPanel.hidden = false;
    this.app.searchInput.focus();
    this.app.searchInput.select();
  }

  /** Closes the search panel and clears highlights. */
  close() {
    this.clear(true);
    this.app.searchPanel.hidden = true;
    this.app.content.focus({ preventScroll: true });
  }

  /** Runs a fresh search and highlights every match. */
  run(query) {
    this.clear(false);
    const term = query.trim();
    if (!term) {
      Utils.setText(this.app.searchCount, "No search active");
      return;
    }
    const pattern = new RegExp(Utils.escapeRegExp(term), "gi");
    const walker = document.createTreeWalker(this.app.content, NodeFilter.SHOW_TEXT, {
      acceptNode: (node) => {
        if (!node.nodeValue || !pattern.test(node.nodeValue)) return NodeFilter.FILTER_REJECT;
        pattern.lastIndex = 0;
        const parent = node.parentElement;
        if (!parent || ["SCRIPT", "STYLE", "MARK"].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach((node) => this.markNode(node, pattern));
    this.marks = [...this.app.content.querySelectorAll("mark.search-mark")];
    this.activeIndex = this.marks.length ? 0 : -1;
    this.updateActive();
  }

  /** Wraps all text matches in mark elements. */
  markNode(node, pattern) {
    const fragment = document.createDocumentFragment();
    const text = node.nodeValue;
    let lastIndex = 0;
    text.replace(pattern, (match, offset) => {
      fragment.appendChild(document.createTextNode(text.slice(lastIndex, offset)));
      fragment.appendChild(Utils.el("mark", "search-mark", match));
      lastIndex = offset + match.length;
      return match;
    });
    fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
    node.parentNode.replaceChild(fragment, node);
  }

  /** Moves to the next search result. */
  next() {
    if (!this.marks.length) return;
    this.activeIndex = (this.activeIndex + 1) % this.marks.length;
    this.updateActive();
  }

  /** Moves to the previous search result. */
  previous() {
    if (!this.marks.length) return;
    this.activeIndex = (this.activeIndex - 1 + this.marks.length) % this.marks.length;
    this.updateActive();
  }

  /** Updates active result styling and count text. */
  updateActive() {
    this.marks.forEach((mark, index) => mark.classList.toggle("is-active", index === this.activeIndex));
    if (!this.marks.length) {
      Utils.setText(this.app.searchCount, "No results");
      return;
    }
    Utils.setText(this.app.searchCount, `${this.activeIndex + 1} of ${this.marks.length}`);
    this.marks[this.activeIndex].scrollIntoView({ behavior: "smooth", block: "center" });
  }

  /** Removes search highlights and restores text nodes. */
  clear(resetInput) {
    this.marks.forEach((mark) => mark.replaceWith(document.createTextNode(mark.textContent || "")));
    this.app.content.normalize();
    this.marks = [];
    this.activeIndex = -1;
    if (resetInput) this.app.searchInput.value = "";
    Utils.setText(this.app.searchCount, "No search active");
  }
}

/* AI Assistant Controller */
class AIAssistant {
  constructor() {
    this.panel = document.getElementById("ai-panel");
    this.closeBtn = document.getElementById("ai-close");
    this.contextText = document.getElementById("ai-context-text");
    this.responseArea = document.getElementById("ai-response-area");
    this.actionButtons = this.panel.querySelectorAll("[data-ai-action]");
    
    this.bindEvents();
  }

  bindEvents() {
    // Listen for clicks on the newly injected inline AI buttons
    document.addEventListener("click", (e) => {
      if (e.target.classList.contains("ai-btn-inline")) {
        const questionText = e.target.dataset.questionText;
        this.openPanel(questionText);
      }
    });

    this.closeBtn.addEventListener("click", () => this.closePanel());

    this.actionButtons.forEach(btn => {
      btn.addEventListener("click", (e) => this.handleAction(e.target.dataset.aiAction));
    });
  }

  openPanel(questionText) {
    this.panel.hidden = false;
    // Brief timeout allows display:block to apply before animating transform
    setTimeout(() => this.panel.classList.add("is-open"), 10);
    this.contextText.textContent = `"${questionText.substring(0, 80)}..."`;
    this.responseArea.hidden = true;
    this.responseArea.innerHTML = "";
  }

  closePanel() {
    this.panel.classList.remove("is-open");
    setTimeout(() => { this.panel.hidden = true; }, 300);
  }

  async handleAction(actionType) {
    this.responseArea.hidden = false;
    this.responseArea.innerHTML = "<p><em>Thinking... 🤖</em></p>";
    
    // TODO: Connect to your actual backend API here.
    // Simulating a network request for now:
    setTimeout(() => {
      this.responseArea.innerHTML = `
        <p><strong>Response for: ${actionType}</strong></p>
        <p>This is where the AI generated content will appear based on the user's request. You can hook this up to your API endpoints.</p>
      `;
    }, 1500);
  }
}

/* Application */
class WorksheetApp {
  /** Initializes DOM references and the renderer. */
  constructor() {
    this.id = Utils.getWorksheetId();
    this.data = null;
    this.title = document.getElementById("worksheet-title");
    this.classLabel = document.getElementById("worksheet-class");
    this.meta = document.getElementById("hero-meta");
    this.status = document.getElementById("status-panel");
    this.card = document.getElementById("worksheet-card");
    this.content = document.getElementById("worksheet-content");
    this.toc = document.getElementById("toc");
    this.tocList = document.getElementById("toc-list");
    this.questions = document.getElementById("questions");
    this.questionsList = document.getElementById("questions-list");
    this.related = document.getElementById("related");
    this.relatedList = document.getElementById("related-list");
    this.progress = document.getElementById("reading-progress");
    this.backToTop = document.getElementById("back-to-top");
    this.toolbar = document.querySelector(".toolbar");
    this.toolbarToggle = document.getElementById("toolbar-toggle");
    this.bookmarkButton = document.querySelector("[data-action='bookmark']");
    this.themeButton = document.querySelector("[data-action='theme']");
    this.focusButton = document.querySelector("[data-action='focus']");
    this.searchPanel = document.getElementById("search-panel");
    this.searchInput = document.getElementById("worksheet-search");
    this.searchCount = document.getElementById("search-count");
    this.resumeCard = document.getElementById("resume-card");
    this.renderer = new WorksheetRenderer(this);
    this.search = new WorksheetSearch(this);
    this.scrollTracked = false;
    this.completeTracked = false;
    this.saveScroll = Utils.debounce(() => StorageService.setScroll(this.id, window.scrollY), 250);
  }

  /** Starts the application lifecycle. */
  async init() {
    this.aiAssistant = new AIAssistant();
    this.bindEvents();
    this.applySavedTheme();
    this.registerServiceWorker();
    if (!this.validateId()) return;
    Analytics.track("worksheet_open", { worksheet_id: this.id });
    WorksheetAPI.trackMetric(this.id, "view");
    const cached = StorageService.getWorksheet(this.id);
    if (cached?.data) this.renderer.render(cached.data, true);
    await this.refreshWorksheet(Boolean(cached?.data));
  }

  /** Validates the worksheet id before making a network request. */
  validateId() {
    if (!/^[a-zA-Z0-9_-]{1,120}$/.test(this.id)) {
      this.showError("Invalid worksheet ID", "Check the link and try opening the worksheet again.", false);
      return false;
    }
    return true;
  }

  /** Refreshes worksheet data from the API and handles stale-while-revalidate behavior. */
  async refreshWorksheet(hasCache) {
    try {
      const data = await WorksheetAPI.fetchWorksheet(this.id);
      this.renderer.render(this.normalize(data), false);
    } catch (error) {
      if (!hasCache) {
        const message = error instanceof WorksheetError ? error.message : "Unable to load worksheet";
        const detail = this.errorDetail(error);
        this.showError(message, detail, true);
      }
    }
  }

  /** Normalizes missing worksheet fields into a predictable object. */
  normalize(data) {
    return {
      worksheetId: Utils.text(data?.worksheetId, this.id),
      title: Utils.text(data?.title, "Untitled worksheet"),
      className: Utils.text(data?.className, "Class not specified"),
      chapter: Utils.text(data?.chapter, "Chapter not specified"),
      board: Utils.text(data?.board, "Board not specified"),
      difficulty: Utils.text(data?.difficulty, "Not specified"),
      topics: Array.isArray(data?.topics) ? data.topics : [],
      questionCount: data?.questionCount ?? 0,
      estimatedTime: Utils.text(data?.estimatedTime, "Not specified"),
      generatedAt: data?.generatedAt || "",
      content: typeof data?.content === "string" && data.content.trim() ? data.content : "<p>Worksheet content is unavailable.</p>",
      stats: data?.stats && typeof data.stats === "object" ? data.stats : null
    };
  }

  /** Loads API-backed related worksheets and falls back to local cache if needed. */
  async loadRelated(data) {
    try {
      const result = await WorksheetAPI.fetchWorksheets();
      const worksheets = Array.isArray(result) ? result : Array.isArray(result?.worksheets) ? result.worksheets : [];
      this.renderer.renderRelated(data, worksheets);
    } catch {
      this.renderer.renderRelated(data, StorageService.listWorksheets());
    }
  }

  /** Loads backend stats and refreshes the hero chips when available. */
  async loadStats() {
    const existing = this.data?.stats;
    if (existing) this.renderer.renderHero(this.data, existing);
    try {
      const stats = await WorksheetAPI.fetchStats(this.id);
      if (stats && this.data) this.renderer.renderHero(this.data, stats);
    } catch {
      return;
    }
  }

  /** Provides user-friendly details for loading errors. */
  errorDetail(error) {
    const code = error instanceof WorksheetError ? error.code : "network";
    const details = {
      "not-found": "Worksheet not found. It may have been moved or unpublished.",
      timeout: "The server took more than 10 seconds to respond.",
      offline: "You appear to be offline. Reconnect and try again.",
      server: "The worksheet server returned an unexpected response.",
      network: "The request could not be completed right now."
    };
    return details[code] || details.network;
  }

  /** Displays a resilient error state with optional retry. */
  showError(title, detail, canRetry) {
    const box = Utils.el("div", "error-box");
    const heading = Utils.el("h2", "", title);
    const message = Utils.el("p", "", detail);
    const actions = Utils.el("div", "error-actions");
    if (canRetry) {
      const retry = Utils.el("button", "", "Retry");
      retry.type = "button";
      retry.addEventListener("click", () => this.refreshWorksheet(false), { passive: true });
      actions.appendChild(retry);
    }
    const library = Utils.el("button", "", "Back to Library");
    library.type = "button";
    library.addEventListener("click", () => { window.location.href = "index.html"; }, { passive: true });
    actions.appendChild(library);
    box.append(heading, message, actions);
    this.status.replaceChildren(box);
    this.status.hidden = false;
    this.card.hidden = true;
  }

  /** Binds UI events with passive listeners where appropriate. */
  bindEvents() {
    document.addEventListener("click", (event) => this.handleClick(event));
    window.addEventListener("scroll", () => this.updateProgress(), { passive: true });
    window.addEventListener("resize", Utils.debounce(() => this.updateProgress()), { passive: true });
    window.addEventListener("online", () => this.refreshWorksheet(Boolean(this.data)), { passive: true });
    this.toolbarToggle.addEventListener("click", () => this.toggleToolbar());
    this.backToTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    this.searchInput.addEventListener("input", Utils.debounce(() => this.search.run(this.searchInput.value), 120));
    document.addEventListener("keydown", (event) => this.handleKeyboard(event));
  }

  /** Handles delegated clicks for toolbar actions and navigation links. */
  handleClick(event) {
    const action = event.target.closest("[data-action]")?.dataset.action;
    if (action) this.runAction(action);
    const navLink = event.target.closest(".toc a, .questions a");
    if (navLink) {
      event.preventDefault();
      document.querySelector(navLink.hash)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  /** Handles keyboard shortcuts for common reading controls. */
  handleKeyboard(event) {
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "f") {
      event.preventDefault();
      this.search.open();
    }
    if (event.key === "Escape") {
      if (!this.searchPanel.hidden) this.search.close();
      if (document.fullscreenElement) document.exitFullscreen();
    }
    if (event.key === "Enter" && document.activeElement === this.searchInput) {
      event.preventDefault();
      event.shiftKey ? this.search.previous() : this.search.next();
    }
    if (event.key.toLowerCase() === "b" && !event.altKey && !event.ctrlKey && !event.metaKey) this.toggleBookmark();
  }

  /** Dispatches toolbar actions to their implementations. */
  runAction(action) {
    const actions = {
      print: () => this.print(),
      download: () => this.downloadPDF(),
      share: () => this.share(),
      bookmark: () => this.toggleBookmark(),
      copy: () => this.copyLink(),
      search: () => this.search.open(),
      "search-next": () => this.search.next(),
      "search-prev": () => this.search.previous(),
      "search-close": () => this.search.close(),
      "font-up": () => this.adjustFont(1),
      "font-down": () => this.adjustFont(-1),
      "line-spacing": () => this.toggleLineSpacing(),
      focus: () => this.toggleFocusMode(),
      fullscreen: () => this.toggleFullscreen(),
      theme: () => this.toggleTheme(),
      resume: () => this.resumeReading(),
      "resume-dismiss": () => this.dismissResume()
    };
    actions[action]?.();
  }

  /** Toggles the mobile toolbar expansion state. */
  toggleToolbar() {
    const open = !this.toolbar.classList.contains("is-open");
    this.toolbar.classList.toggle("is-open", open);
    this.toolbarToggle.setAttribute("aria-expanded", String(open));
  }

  /** Updates reading progress, saved position, back-to-top visibility, and completion analytics. */
  updateProgress() {
    const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
    const percent = Math.min(100, Math.max(0, (window.scrollY / max) * 100));
    this.progress.style.width = `${percent}%`;
    this.backToTop.classList.toggle("is-visible", window.scrollY > 520);
    this.saveScroll();
    if (!this.scrollTracked && percent > 15) {
      this.scrollTracked = true;
      Analytics.track("worksheet_scroll", { worksheet_id: this.id });
    }
    if (!this.completeTracked && percent > 92) {
      this.completeTracked = true;
      Analytics.track("worksheet_complete", { worksheet_id: this.id });
    }
  }

  /** Offers to restore a meaningful saved scroll position. */
  offerResume() {
    const saved = StorageService.getScroll(this.id);
    if (!saved?.position || saved.position < 280 || window.scrollY > 20) return;
    this.resumeCard.hidden = false;
  }

  /** Restores the saved scroll position for the worksheet. */
  resumeReading() {
    const saved = StorageService.getScroll(this.id);
    this.resumeCard.hidden = true;
    if (saved?.position) window.scrollTo({ top: saved.position, behavior: "smooth" });
  }

  /** Dismisses the resume prompt and starts at the top. */
  dismissResume() {
    StorageService.setScroll(this.id, 0);
    this.resumeCard.hidden = true;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  /** Opens the browser print dialog for clean printing. */
  print() {
    Analytics.track("worksheet_print", { worksheet_id: this.id });
    WorksheetAPI.trackMetric(this.id, "print");
    window.print();
  }

  /** Downloads a PDF through the PDF service or falls back to print. */
  downloadPDF() {
    PDFService.export(this);
  }

  /** Shares through the native share sheet or copies the URL as a fallback. */
  async share() {
    Analytics.track("worksheet_share", { worksheet_id: this.id });
    if (navigator.share) {
      try {
        await navigator.share({ title: document.title, url: window.location.href });
        return;
      } catch {
        return;
      }
    }
    await this.copyLink();
  }

  /** Copies the current worksheet URL to the clipboard. */
  async copyLink() {
    try {
      await navigator.clipboard.writeText(window.location.href);
      Analytics.track("copy_link", { worksheet_id: this.id });
      this.flashButton("[data-action='copy']", "Copied");
    } catch {
      this.showError("Copy failed", "Your browser blocked clipboard access. Use the address bar to copy the link.", false);
    }
  }

  /** Toggles the bookmark for the current worksheet. */
  toggleBookmark() {
    const bookmarked = StorageService.toggleBookmark(this.id);
    Analytics.track("worksheet_bookmark", { worksheet_id: this.id, bookmarked });
    WorksheetAPI.trackMetric(this.id, bookmarked ? "bookmark" : "unbookmark");
    this.updateBookmarkState();
  }

  /** Reflects the current bookmark state in the toolbar. */
  updateBookmarkState() {
    const bookmarked = StorageService.isBookmarked(this.id);
    this.bookmarkButton.setAttribute("aria-pressed", String(bookmarked));
    this.bookmarkButton.textContent = bookmarked ? "Remove Bookmark" : "Bookmark";
  }

  /** Toggles fullscreen mode for the worksheet page. */
  async toggleFullscreen() {
    if (document.fullscreenElement) {
      await document.exitFullscreen();
    } else {
      await document.documentElement.requestFullscreen();
    }
  }

  /** Applies the saved theme on startup. */
  applySavedTheme() {
    const theme = window.localStorage.getItem("cinephysics_theme") || "dark";
    document.documentElement.dataset.theme = theme;
    this.themeButton.setAttribute("aria-pressed", String(theme === "dark"));
  }

  /** Toggles between dark and light reading themes. */
  toggleTheme() {
    const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
    document.documentElement.dataset.theme = next;
    window.localStorage.setItem("cinephysics_theme", next);
    this.themeButton.setAttribute("aria-pressed", String(next === "dark"));
  }

  /** Applies persisted reader preferences to the worksheet content. */
  applyReaderPrefs() {
    const prefs = StorageService.get("cinephysics_reader", { font: 100, line: 165, focus: false });
    this.content.style.setProperty("--reader-font-size", `${Math.min(130, Math.max(85, prefs.font || 100)) / 100}rem`);
    this.content.style.setProperty("--reader-line-height", String(Math.min(2.1, Math.max(1.45, (prefs.line || 165) / 100))));
    document.body.classList.toggle("is-focus-mode", Boolean(prefs.focus));
    this.focusButton.setAttribute("aria-pressed", String(Boolean(prefs.focus)));
  }

  /** Increases or decreases the worksheet font size. */
  adjustFont(direction) {
    const prefs = StorageService.get("cinephysics_reader", { font: 100, line: 165, focus: false });
    prefs.font = Math.min(130, Math.max(85, (prefs.font || 100) + direction * 5));
    StorageService.set("cinephysics_reader", prefs);
    this.applyReaderPrefs();
  }

  /** Toggles generous line spacing for longer reading sessions. */
  toggleLineSpacing() {
    const prefs = StorageService.get("cinephysics_reader", { font: 100, line: 165, focus: false });
    prefs.line = prefs.line && prefs.line > 170 ? 165 : 190;
    StorageService.set("cinephysics_reader", prefs);
    this.applyReaderPrefs();
  }

  /** Toggles focus mode, hiding supporting panels around the worksheet. */
  toggleFocusMode() {
    const prefs = StorageService.get("cinephysics_reader", { font: 100, line: 165, focus: false });
    prefs.focus = !prefs.focus;
    StorageService.set("cinephysics_reader", prefs);
    this.applyReaderPrefs();
  }

  /** Registers the service worker for offline worksheet assets. */
  registerServiceWorker() {
    if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    }
  }

  /** Temporarily changes a button label to confirm an action. */
  flashButton(selector, label) {
    const button = document.querySelector(selector);
    if (!button) return;
    const original = button.textContent;
    button.textContent = label;
    window.setTimeout(() => { button.textContent = original; }, 1400);
  }
}

          <button type="button" data-ai-action="harder">Generate Harder Version</button>

        <div class="ai-panel__response" id="ai-response-area" hidden>
          </div>
      </div>

    <script type="text/plain" id="embedded-service-worker">
"use strict";

const CACHE_NAME = "cinephysics-worksheet-v1";
const SHELL_ASSETS = [
  "worksheet.html",
  "worksheet.css",
  "worksheet.js"
];

/** Opens the current application cache. */
const openCache = () => caches.open(CACHE_NAME);

/** Stores a response clone when it is safe to cache. */
const cacheResponse = async (request, response) => {
  if (!response || response.status !== 200 || request.method !== "GET") return response;
  const cache = await openCache();
  cache.put(request, response.clone());
  return response;
};

/** Returns true for requests that should use a network-first worksheet strategy. */
const isWorksheetRequest = (request) => {
  const url = new URL(request.url);
  return url.pathname.includes("/api/worksheet") || url.pathname.endsWith("worksheet.html");
};

/** Handles shell files with cache-first delivery. */
const cacheFirst = async (request) => {
  const cache = await openCache();
  const cached = await cache.match(request);
  if (cached) return cached;
  return cacheResponse(request, await fetch(request));
};

/** Handles worksheet pages and API data with network-first delivery. */
const networkFirst = async (request) => {
  const cache = await openCache();
  try {
    return await cacheResponse(request, await fetch(request));
  } catch {
    const cached = await cache.match(request);
    if (cached) return cached;
    if (request.mode === "navigate") return cache.match("worksheet.html");
    throw new Error("Offline and no cached worksheet response is available.");
  }
};

self.addEventListener("install", (event) => {
  event.waitUntil(openCache().then((cache) => cache.addAll(SHELL_ASSETS)));
  self.skipWaiting();
});

self.addEventListener("activate", (event) => {
  event.waitUntil(
    caches.keys().then((keys) => Promise.all(keys.filter((key) => key !== CACHE_NAME).map((key) => caches.delete(key))))
  );
  self.clients.claim();
});

self.addEventListener("fetch", (event) => {
  const { request } = event;
  if (request.method !== "GET") return;
  const url = new URL(request.url);
  if (isWorksheetRequest(request)) {
    event.respondWith(networkFirst(request));
    return;
  }
  if (SHELL_ASSETS.some((asset) => url.pathname.endsWith(asset))) {
    event.respondWith(cacheFirst(request));
  }
});

    </script>
  </body>
