<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CinePhysicsHQ Admin Panel - Manage and approve student-generated worksheets">
    <title>CinePhysicsHQ Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #0f1424;
            --surface2: #141d33;
            --border: #1e2f47;
            --accent: #00d4ff;
            --accent-warm: #ff9d00;
            --accent-alt: #7c3aed;
            --text: #e2eaf5;
            --text-muted: #5a7a99;
            --success: #00e5a0;
            --danger: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #141d33 100%);
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.1);
        }

        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: #ff8888;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logout-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .admin-info {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        /* WORKSHEETS GRID */
        .worksheets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .worksheet-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s;
        }

        .worksheet-card:hover {
            border-color: var(--accent);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.1);
        }

        .worksheet-header {
            margin-bottom: 1.5rem;
        }

        .worksheet-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .worksheet-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pending {
            background: rgba(255, 157, 0, 0.2);
            color: var(--accent-warm);
            border: 1px solid var(--accent-warm);
        }

        .status-approved {
            background: rgba(0, 229, 160, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .worksheet-details {
            margin: 1.5rem 0;
            padding: 1rem;
            background: var(--surface2);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .detail-row span:first-child {
            color: var(--text-muted);
        }

        .worksheet-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-approve, .btn-reject {
            flex: 1;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-approve {
            background: rgba(0, 229, 160, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .btn-approve:hover {
            background: var(--success);
            color: var(--bg);
        }

        .btn-reject {
            background: rgba(255, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-reject:hover {
            background: var(--danger);
            color: white;
        }

        .btn-approve:disabled, .btn-reject:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .worksheets-container {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>⚡ CinePhysicsHQ</h1>
        <p>Admin Panel</p>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="your@email.com" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••" 
                    required
                >
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Login as Admin</button>
        </form>
    </div>
</div>

<div id="dashboard" class="dashboard">
    <div class="container">
        <div class="header">
            <div>
                <h1>Admin Dashboard</h1>
                <div class="admin-info">
                    Logged in as: <span id="adminEmail"></span>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="statPending">0</div>
                <div class="stat-label">Pending Review</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statApproved">0</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total Worksheets</div>
            </div>
        </div>

        <div class="loading" id="loadingState" style="display: none;">
            Loading worksheets... ⏳
        </div>

        <div id="worksheetsContainer" class="worksheets-container"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📭</div>
            <h2>No worksheets yet</h2>
            <p>Students will submit their generated worksheets here for your approval.</p>
        </div>
    </div>
</div>

<script>
// ==========================================
// CONFIGURATION
// ==========================================
// Replace this with your actual deployed Vercel domain
const API_BASE = "https://cinephysics-api.vercel.app/api"; 

// DOM Elements
const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const loginForm = document.getElementById('loginForm');
const logoutBtn = document.getElementById('logoutBtn');
const errorMessage = document.getElementById('errorMessage');
const adminEmail = document.getElementById('adminEmail');
const worksheetsContainer = document.getElementById('worksheetsContainer');
const emptyState = document.getElementById('emptyState');
const loadingState = document.getElementById('loadingState');

// ==========================================
// SESSION MANAGEMENT & UI STATE
// ==========================================

// Check Authentication Session on Load
window.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch(`${API_BASE}/admin/session`, { 
            credentials: 'include' 
        });
        const data = await res.json();
        
        if (data.authenticated) {
            showDashboard(data.email);
        } else {
            showLoginScreen();
        }
    } catch (error) {
        showLoginScreen();
    }
});

function showDashboard(email) {
    loginScreen.style.display = "none";
    dashboard.classList.add("active");
    adminEmail.textContent = email;
    loadWorksheets();
}

function showLoginScreen() {
    loginScreen.style.display = "flex";
    dashboard.classList.remove("active");
    worksheetsContainer.innerHTML = '';
}

// ==========================================
// AUTHENTICATION HANDLERS
// ==========================================

// LOGIN
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';
    errorMessage.classList.remove('show');
    
    try {
        const response = await fetch(`${API_BASE}/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
            credentials: 'include'
        });

        const data = await response.json();

        if (data.success) {
            showDashboard(email);
        } else {
            errorMessage.textContent = '❌ ' + (data.message || 'Login failed.');
            errorMessage.classList.add('show');
        }
    } catch (error) {
        errorMessage.textContent = '❌ Network error. Please try again.';
        errorMessage.classList.add('show');
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login as Admin';
    }
});

// LOGOUT
logoutBtn.addEventListener('click', async () => {
    try {
        await fetch(`${API_BASE}/admin/logout`, { 
            method: 'POST', 
            credentials: 'include' 
        });
        showLoginScreen();
        loginForm.reset();
    } catch (error) {
        console.error('Logout error:', error);
    }
});

// ==========================================
// DATA FETCHING & RENDERING
// ==========================================

// LOAD WORKSHEETS
async function loadWorksheets() {
    loadingState.style.display = 'block';
    worksheetsContainer.innerHTML = '';
    emptyState.style.display = 'none';
    
    try {
        const response = await fetch(`${API_BASE}/admin/worksheets`, { 
            credentials: 'include' 
        });
        
        if (!response.ok) throw new Error('Failed to fetch worksheets');
        
        const worksheetsData = await response.json();
        
        // Ensure data is structured correctly before rendering
        if (!worksheetsData || Object.keys(worksheetsData).length === 0) {
            emptyState.style.display = 'block';
            loadingState.style.display = 'none';
            updateStats(0, 0, 0);
            return;
        }
        
        let allWorksheets = [];
        let pendingCount = 0;
        let approvedCount = 0;
        
        Object.keys(worksheetsData).forEach(chapter => {
            Object.keys(worksheetsData[chapter]).forEach(id => {
                const ws = worksheetsData[chapter][id];
                allWorksheets.push({
                    id: id,
                    chapter: chapter,
                    ...ws
                });
                
                if (ws.status === 'pending') pendingCount++;
                else if (ws.status === 'approved') approvedCount++;
            });
        });
        
        const pendingWorksheets = allWorksheets.filter(ws => ws.status === 'pending');
        const approvedWorksheets = allWorksheets.filter(ws => ws.status === 'approved');
        
        if (pendingWorksheets.length === 0 && approvedWorksheets.length === 0) {
            emptyState.style.display = 'block';
        } else {
            pendingWorksheets.forEach(ws => {
                worksheetsContainer.appendChild(createWorksheetCard(ws));
            });
            
            approvedWorksheets.forEach(ws => {
                const card = createWorksheetCard(ws);
                card.style.opacity = '0.6';
                worksheetsContainer.appendChild(card);
            });
        }
        
        updateStats(pendingCount, approvedCount, allWorksheets.length);
        
    } catch (error) {
        console.error('Error loading worksheets:', error);
        errorMessage.textContent = '❌ Error loading worksheets: ' + error.message;
        errorMessage.classList.add('show');
    }
    
    loadingState.style.display = 'none';
}

// CREATE WORKSHEET CARD
function createWorksheetCard(worksheet) {
    const card = document.createElement('div');
    card.className = 'worksheet-card';
    
    const status = worksheet.status || 'pending';
    const statusText = status === 'pending' ? '⏳ Pending' : '✓ Approved';
    const statusClass = status === 'pending' ? 'status-pending' : 'status-approved';
    
    card.innerHTML = `
        <div class="worksheet-header">
            <h3 class="worksheet-title">${worksheet.chapter}</h3>
            <div class="worksheet-meta">
                <span class="status-badge ${statusClass}">${statusText}</span>
                <span>${worksheet.difficulty || 'N/A'}</span>
            </div>
        </div>
        
        <div class="worksheet-details">
            <div class="detail-row">
                <span>By:</span>
                <span>${worksheet.userName || 'Anonymous'}</span>
            </div>
            <div class="detail-row">
                <span>Questions:</span>
                <span>${worksheet.questions?.length || 0}</span>
            </div>
            <div class="detail-row">
                <span>Type:</span>
                <span>${worksheet.questionType || 'Mixed'}</span>
            </div>
            <div class="detail-row">
                <span>Date:</span>
                <span>${new Date(worksheet.timestamp).toLocaleDateString()}</span>
            </div>
        </div>
        
        ${status === 'pending' ? `
            <div class="worksheet-actions">
                <button class="btn-approve" onclick="approveWorksheet('${worksheet.chapter}', '${worksheet.id}')">
                    ✓ Approve
                </button>
                <button class="btn-reject" onclick="rejectWorksheet('${worksheet.chapter}', '${worksheet.id}')">
                    ✕ Reject
                </button>
            </div>
        ` : `
            <div style="padding: 1rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                ✓ Approved by admin
            </div>
        `}
    `;
    
    return card;
}

// ==========================================
// ACTIONS (APPROVE/REJECT)
// ==========================================

async function approveWorksheet(chapter, id) {
    if (!confirm('Approve this worksheet?')) return;
    
    try {
        const response = await fetch(`${API_BASE}/admin/approve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chapter, id }),
            credentials: 'include'
        });
        
        if (!response.ok) throw new Error('Action failed');
        loadWorksheets();
    } catch (error) {
        alert('Error approving worksheet: ' + error.message);
    }
}

async function rejectWorksheet(chapter, id) {
    if (!confirm('Reject this worksheet? It will be removed.')) return;
    
    try {
        const response = await fetch(`${API_BASE}/admin/reject`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chapter, id }),
            credentials: 'include'
        });
        
        if (!response.ok) throw new Error('Action failed');
        loadWorksheets();
    } catch (error) {
        alert('Error rejecting worksheet: ' + error.message);
    }
}

// ==========================================
// UTILITIES
// ==========================================
function updateStats(pending, approved, total) {
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statApproved').textContent = approved;
    document.getElementById('statTotal').textContent = total;
}
</script>

</body>
</html>
