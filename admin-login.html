<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CinePhysicsHQ Admin Panel - Manage and approve student-generated worksheets">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <title>CinePhysicsHQ Admin Panel v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>

    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #0f1424;
            --surface2: #141d33;
            --border: #1e2f47;
            --accent: #00d4ff;
            --accent-warm: #ff9d00;
            --accent-alt: #7c3aed;
            --text: #e2eaf5;
            --text-muted: #5a7a99;
            --success: #00e5a0;
            --danger: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; line-height: 1.6; }
        .container { max-width: 1300px; margin: 0 auto; padding: 2rem; }

        /* REUSABLE UI */
        .btn { padding: 0.9rem; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%); color: var(--bg); border: none; border-radius: 6px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0, 212, 255, 0.3); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--surface2); }
        
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: var(--text-muted); }
        .form-control { width: 100%; padding: 0.8rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Syne', sans-serif; }
        .form-control:focus { outline: none; border-color: var(--accent); }

        /* LOGIN */
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0a0e1a 0%, #141d33 100%); }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 3rem; width: 100%; max-width: 400px; }
        .login-card h1 { font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* DASHBOARD */
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 2rem; color: var(--accent); }
        .admin-info { color: var(--text-muted); font-size: 0.9rem; }
        .header-controls { display: flex; gap: 10px; }

        /* STATS */
        .dashboard-metrics { display: flex; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .chart-container { width: 300px; height: 150px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
        .stats-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--accent-warm); }

        /* TOOLBAR */
        .toolbar { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; align-items: center; background: var(--surface); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .search-box input { padding: 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); width: 300px; }
        .action-btn { padding: 0.5rem 1rem; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }

        /* CARDS */
        .worksheets-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
        .worksheet-card { position: relative; background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: 0.3s; }
        .worksheet-card:hover { border-color: var(--accent); }
        .card-checkbox { position: absolute; top: 1.5rem; right: 1.5rem; width: 18px; height: 18px; accent-color: var(--accent); }
        
        .card-header { margin-bottom: 1rem; padding-right: 2rem; }
        .card-title { font-size: 1.2rem; font-weight: 700; color: white; }
        .status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-top: 0.5rem;}
        .status-pending { background: rgba(255, 157, 0, 0.2); color: var(--accent-warm); }
        .status-approved { background: rgba(0, 229, 160, 0.2); color: var(--success); }
        .status-rejected { background: rgba(255, 68, 68, 0.2); color: var(--danger); }

        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.8rem; background: var(--bg); padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .card-grid span { color: var(--text-muted); }
        .card-grid strong { color: var(--text); float: right; }

        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem; }
        .card-btn { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .card-btn:hover { background: var(--surface2); color: var(--accent); }
        
        .btn-green { border-color: var(--success); color: var(--success); }
        .btn-green:hover { background: var(--success); color: var(--bg); }
        .btn-red { border-color: var(--danger); color: var(--danger); }
        .btn-red:hover { background: var(--danger); color: white; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 14, 26, 0.95); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 600px; padding: 2rem; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-large { max-width: 1200px; height: 90vh; display: flex; flex-direction: column; padding: 1rem; }
        
        /* EDITOR SPLIT SCREEN */
        .editor-container { display: flex; flex: 1; gap: 1rem; min-height: 0; margin-top: 1rem; }
        .editor-pane { flex: 1; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        #monacoContainer { flex: 1; width: 100%; }
        .preview-iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* HISTORY TIMELINE */
        .history-list { margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem; }
        .history-item { padding: 0.8rem; background: var(--bg); border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.8rem; }
        .history-item button { float: right; padding: 0.2rem 0.5rem; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; cursor: pointer; }

        /* TOASTS */
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 1rem; border-radius: 8px; font-weight: 600; color: white; transform: translateX(120%); animation: slideIn 0.3s forwards; }
        .toast-success { background: var(--success); color: var(--bg); }
        .toast-error { background: var(--danger); }
        @keyframes slideIn { to { transform: translateX(0); } }

    </style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>⚡ Admin Auth</h1>
        <form id="loginForm">
            <div class="form-group"><input class="form-control" type="email" id="email" placeholder="admin@cinephysics.com" required></div>
            <div class="form-group"><input class="form-control" type="password" id="password" placeholder="••••••••" required></div>
            <button type="submit" class="btn" id="loginBtn" style="width: 100%;">Login</button>
        </form>
    </div>
</div>

<div id="dashboard" class="dashboard">
    <div class="container">
        <div class="header">
            <div>
                <h1>CinePhysicsHQ Control</h1>
                <div class="admin-info">Logged in: <span id="adminEmail"></span></div>
            </div>
            <div class="header-controls">
                <button class="btn btn-outline" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="dashboard-metrics">
            <div class="chart-container"><canvas id="statsChart"></canvas></div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-number" id="statPending">0</div><div>Pending</div></div>
                <div class="stat-box"><div class="stat-number" id="statApproved">0</div><div>Approved</div></div>
                <div class="stat-box"><div class="stat-number" id="statRejected">0</div><div>Rejected</div></div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search IDs, Topics, Teachers...">
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="action-btn" onclick="openBatchModal()" id="batchBtn" disabled>⚙️ Batch Actions</button>
                <button class="action-btn" onclick="exportCSV()">⬇ Export CSV</button>
            </div>
        </div>

        <div id="worksheetsContainer" class="worksheets-container"></div>
    </div>
</div>

<div id="metaModal" class="modal-overlay">
    <div class="modal-content">
        <h2>✏️ Edit Metadata</h2>
        <form id="metaForm" style="margin-top: 1rem;">
            <input type="hidden" id="editId">
            <div class="form-group"><label>Title/Topic</label><input type="text" id="editTitle" class="form-control"></div>
            <div class="form-group"><label>Chapter</label><input type="text" id="editChapter" class="form-control"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group"><label>Board</label><select id="editBoard" class="form-control"><option>CBSE</option><option>ICSE</option><option>State</option></select></div>
                <div class="form-group"><label>Class</label><select id="editClass" class="form-control"><option>11</option><option>12</option><option>10</option></select></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group"><label>Difficulty</label><select id="editDiff" class="form-control"><option>Easy</option><option>Medium</option><option>Hard</option></select></div>
                <div class="form-group"><label>Total Questions</label><input type="number" id="editTotalQ" class="form-control"></div>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="submit" class="btn" style="flex: 1;">Save Changes</button>
                <button type="button" class="btn btn-outline" onclick="closeModal('metaModal')" style="flex: 1;">Cancel</button>
            </div>
        </form>
        
        <div class="history-list">
            <h3>📜 Version History</h3>
            <div id="historyContainer">No history available.</div>
        </div>
    </div>
</div>

<div id="htmlModal" class="modal-overlay">
    <div class="modal-content modal-large">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>📝 Code Editor & Live Preview</h2>
            <div>
                <button class="btn" onclick="saveHTML()">Save & Auto-Count</button>
                <button class="btn btn-outline" onclick="closeModal('htmlModal')">Close</button>
            </div>
        </div>
        <div class="editor-container">
            <div class="editor-pane" id="monacoContainer"></div>
            <div class="editor-pane"><iframe id="previewIframe" class="preview-iframe"></iframe></div>
        </div>
    </div>
</div>

<div id="approveModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h2>Approve Worksheet?</h2>
        <p style="color: var(--text-muted); margin: 1rem 0;">Publishing makes it visible to students immediately.</p>
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <button class="btn btn-green" onclick="submitApprove(true)">Approve & Publish</button>
            <button class="btn" onclick="submitApprove(false)">Approve Only</button>
            <button class="btn btn-outline" onclick="closeModal('approveModal')">Cancel</button>
        </div>
    </div>
</div>

<div id="rejectModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 400px;">
        <h2>Reject Worksheet</h2>
        <div class="form-group" style="margin-top: 1rem;">
            <label>Rejection Reason</label>
            <select id="rejectReason" class="form-control">
                <option>Formatting Issue</option><option>Duplicate</option>
                <option>Wrong Answer</option><option>Low Quality</option>
                <option>Incomplete</option><option>Other</option>
            </select>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button class="btn btn-red" style="flex:1;" onclick="submitReject()">Reject</button>
            <button class="btn btn-outline" style="flex:1;" onclick="closeModal('rejectModal')">Cancel</button>
        </div>
    </div>
</div>

<div id="batchModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px;">
        <h2>⚙️ Batch Actions (<span id="batchCount">0</span> selected)</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
            <button class="btn btn-green" onclick="executeBatch('approve')">Approve All</button>
            <button class="btn btn-red" onclick="executeBatch('reject')">Reject All</button>
            <button class="btn btn-outline" onclick="executeBatch('delete')">Permanent Delete</button>
        </div>
        <hr style="border-color: var(--border); margin: 1.5rem 0;">
        <div style="display: flex; gap: 0.5rem;">
            <select id="batchBoard" class="form-control"><option value="">Change Board...</option><option>CBSE</option><option>ICSE</option></select>
            <button class="btn" onclick="executeBatch('board')">Apply</button>
        </div>
        <button class="btn btn-outline" style="width:100%; margin-top: 1rem;" onclick="closeModal('batchModal')">Cancel</button>
    </div>
</div>


<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAVPytvxafQYKoLhxOr2QcNT-fgwk6Cnmk",
  authDomain: "cinephysicshq.firebaseapp.com",
  projectId: "cinephysicshq",
  storageBucket: "cinephysicshq.firebasestorage.app",
  messagingSenderId: "506903518720",
  appId: "1:506903518720:web:734e3e53e5fbbbc3abc2e5"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "singhabhijit327@gmail.com";
let allWorksheets = [];
let selectedItems = new Set();
let dashboardChart = null;
let currentActionId = null; 
let monacoEditorInstance = null;

// --- TOAST NOTIFICATIONS ---
function showToast(msg, type="success") {
    const box = document.createElement('div');
    box.className = `toast toast-${type}`;
    box.textContent = msg;
    document.getElementById('toastContainer').appendChild(box);
    setTimeout(() => { box.style.opacity='0'; setTimeout(()=>box.remove(), 300); }, 3000);
}

// --- AUTHENTICATION ---
auth.onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('adminEmail').textContent = user.email;
        startLiveListener();
    } else {
        if(user) { showToast("Unauthorized access denied.", "error"); auth.signOut(); }
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').classList.remove('active');
    }
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
        await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
    } catch (err) { showToast(err.message, "error"); }
});
document.getElementById('logoutBtn').onclick = () => auth.signOut();

// --- DATA LISTENER ---
function startLiveListener() {
    db.collection("worksheets").onSnapshot(snap => {
        allWorksheets = [];
        let p=0, a=0, r=0;
        snap.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            allWorksheets.push(data);
            if(data.status==='pending') p++; else if(data.status==='approved') a++; else if(data.status==='rejected') r++;
        });
        
        // Sort by newest first
        allWorksheets.sort((x, y) => {
            let t1 = x.createdAt ? new Date(x.createdAt).getTime() : 0;
            let t2 = y.createdAt ? new Date(y.createdAt).getTime() : 0;
            return t2 - t1;
        });

        document.getElementById('statPending').textContent = p;
        document.getElementById('statApproved').textContent = a;
        document.getElementById('statRejected').textContent = r;
        updateChart(p, a, r);
        renderCards();
    });
}

function updateChart(p, a, r) {
    const ctx = document.getElementById('statsChart').getContext('2d');
    if (dashboardChart) { dashboardChart.data.datasets[0].data = [p, a, r]; dashboardChart.update(); }
    else {
        dashboardChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Pending', 'Approved', 'Rejected'], datasets: [{ data: [p, a, r], backgroundColor: ['#ff9d00', '#00e5a0', '#ff4444'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {color: '#fff'} } } }
        });
    }
}

// --- RENDER CARDS ---
document.getElementById('searchInput').addEventListener('input', renderCards);

function renderCards() {
    const container = document.getElementById('worksheetsContainer');
    container.innerHTML = '';
    const term = document.getElementById('searchInput').value.toLowerCase();
    
    let filtered = allWorksheets.filter(w => {
        const str = `${w.id} ${w.title} ${w.chapter} ${w.topics} ${w.generator} ${w.teacherName} ${w.board} ${w.className}`.toLowerCase();
        return str.includes(term);
    });

    filtered.forEach(ws => {
        const card = document.createElement('div');
        card.className = 'worksheet-card';
        const isChecked = selectedItems.has(ws.id) ? 'checked' : '';
        const d = ws.createdAt ? new Date(ws.createdAt).toLocaleDateString() : 'N/A';
        const ed = ws.updatedAt ? new Date(ws.updatedAt).toLocaleDateString() : 'N/A';
        
        card.innerHTML = `
            <input type="checkbox" class="card-checkbox" value="${ws.id}" ${isChecked} onchange="toggleSelect(this)">
            <div class="card-header">
                <div class="card-title">${ws.title || ws.chapter || 'Untitled'}</div>
                <span class="status-badge status-${ws.status||'pending'}">${ws.status||'Pending'}</span>
            </div>
            <div class="card-grid">
                <span>🆔 ID:</span> <strong>${ws.id.substring(0,6)}...</strong>
                <span>🏫 Board:</span> <strong>${ws.board||'N/A'}</strong>
                <span>📚 Class:</span> <strong>${ws.className||'N/A'}</strong>
                <span>📊 Diff:</span> <strong>${ws.difficulty||'N/A'}</strong>
                <span>❓ Qty:</span> <strong>${ws.totalQuestions||0}</strong>
                <span>👤 Gen:</span> <strong>${ws.generator||'N/A'}</strong>
                <span>📅 Created:</span> <strong>${d}</strong>
                <span>✏️ Edited:</span> <strong>${ed}</strong>
            </div>
            <div class="card-actions">
                <button class="card-btn btn-green" onclick="openApprove('${ws.id}')">✓ Approve</button>
                <button class="card-btn btn-red" onclick="openReject('${ws.id}')">✕ Reject</button>
                <button class="card-btn" onclick="openMetaEditor('${ws.id}')">✏️ Edit Meta</button>
                <button class="card-btn" onclick="openHTMLEditor('${ws.id}')">📝 Edit HTML</button>
            </div>
        `;
        container.appendChild(card);
    });
}

// --- SELECTION & BATCH ---
function toggleSelect(cb) {
    if(cb.checked) selectedItems.add(cb.value); else selectedItems.delete(cb.value);
    document.getElementById('batchBtn').disabled = selectedItems.size === 0;
    document.getElementById('batchCount').textContent = selectedItems.size;
}

function openBatchModal() { document.getElementById('batchModal').classList.add('active'); }

async function executeBatch(action) {
    const batch = db.batch();
    const ts = new Date().toISOString();
    let updates = {};
    
    if(action === 'approve') updates = { status: 'approved', published: true, publishedAt: ts, publishedBy: auth.currentUser.email };
    else if(action === 'reject') updates = { status: 'rejected', rejectedAt: ts, rejectedBy: auth.currentUser.email };
    else if(action === 'board') {
        const b = document.getElementById('batchBoard').value;
        if(!b) return;
        updates = { board: b, updatedAt: ts, updatedBy: auth.currentUser.email };
    }
    
    try {
        selectedItems.forEach(id => {
            const ref = db.collection('worksheets').doc(id);
            if(action === 'delete') batch.delete(ref); else batch.update(ref, updates);
        });
        await batch.commit();
        showToast(`Batch ${action} completed successfully.`);
        closeModal('batchModal');
        selectedItems.clear();
        document.getElementById('batchBtn').disabled = true;
    } catch(e) { showToast(e.message, 'error'); }
}

// --- MODAL UTILS ---
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// --- APPROVE & REJECT WORKFLOWS ---
function openApprove(id) { currentActionId = id; document.getElementById('approveModal').classList.add('active'); }
function openReject(id) { currentActionId = id; document.getElementById('rejectModal').classList.add('active'); }

async function submitApprove(publish) {
    try {
        const payload = { status: 'approved', publishedAt: new Date().toISOString(), publishedBy: auth.currentUser.email };
        if(publish) payload.published = true;
        await db.collection('worksheets').doc(currentActionId).update(payload);
        showToast("Worksheet Approved!");
        closeModal('approveModal');
    } catch(e) { showToast(e.message, 'error'); }
}

async function submitReject() {
    try {
        const reason = document.getElementById('rejectReason').value;
        await db.collection('worksheets').doc(currentActionId).update({
            status: 'rejected', rejectReason: reason, rejectedAt: new Date().toISOString(), rejectedBy: auth.currentUser.email
        });
        showToast("Worksheet Rejected.");
        closeModal('rejectModal');
    } catch(e) { showToast(e.message, 'error'); }
}

// --- HISTORY LOGIC ---
async function saveHistory(id, oldData, newData) {
    const changes = {}, oldV = {};
    for(let key in newData) {
        if(oldData[key] !== newData[key]) { changes[key] = newData[key]; oldV[key] = oldData[key]; }
    }
    if(Object.keys(changes).length > 0) {
        await db.collection('worksheets').doc(id).collection('history').add({
            editorEmail: auth.currentUser.email,
            editedAt: new Date().toISOString(),
            changedFields: Object.keys(changes),
            oldValues: oldV,
            newValues: changes
        });
    }
}

// --- METADATA EDITOR ---
async function openMetaEditor(id) {
    currentActionId = id;
    const ws = allWorksheets.find(w => w.id === id);
    document.getElementById('editId').value = id;
    document.getElementById('editTitle').value = ws.title || ws.chapter || '';
    document.getElementById('editChapter').value = ws.chapter || '';
    document.getElementById('editBoard').value = ws.board || 'CBSE';
    document.getElementById('editClass').value = ws.className || '12';
    document.getElementById('editDiff').value = ws.difficulty || 'Medium';
    document.getElementById('editTotalQ').value = ws.totalQuestions || 0;
    
    // Fetch History
    const hContainer = document.getElementById('historyContainer');
    hContainer.innerHTML = 'Loading...';
    const snap = await db.collection('worksheets').doc(id).collection('history').orderBy('editedAt', 'desc').get();
    if(snap.empty) { hContainer.innerHTML = 'No history available.'; }
    else {
        hContainer.innerHTML = '';
        snap.forEach(doc => {
            const h = doc.data();
            const d = new Date(h.editedAt).toLocaleString();
            hContainer.innerHTML += `<div class="history-item"><strong>${d}</strong> by ${h.editorEmail}<br>Fields: ${h.changedFields.join(', ')}</div>`;
        });
    }
    
    document.getElementById('metaModal').classList.add('active');
}

document.getElementById('metaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const oldData = allWorksheets.find(w => w.id === id);
    
    const newData = {
        title: document.getElementById('editTitle').value,
        chapter: document.getElementById('editChapter').value,
        board: document.getElementById('editBoard').value,
        className: document.getElementById('editClass').value,
        difficulty: document.getElementById('editDiff').value,
        totalQuestions: parseInt(document.getElementById('editTotalQ').value),
        updatedAt: new Date().toISOString(),
        updatedBy: auth.currentUser.email
    };

    try {
        await saveHistory(id, oldData, newData);
        await db.collection('worksheets').doc(id).update(newData);
        showToast("Metadata Saved!");
        closeModal('metaModal');
    } catch(err) { showToast(err.message, 'error'); }
});

// --- HTML EDITOR & PREVIEW (Monaco Setup) ---
function initMonaco() {
    if(monacoEditorInstance) return;
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        monacoEditorInstance = monaco.editor.create(document.getElementById('monacoContainer'), {
            value: '', language: 'html', theme: 'vs-dark', wordWrap: 'on', automaticLayout: true
        });
        
        monacoEditorInstance.onDidChangeModelContent(() => {
            const html = monacoEditorInstance.getValue();
            // Inject MathJax for preview rendering
            const previewHTML = `
                <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"><\/script>
                <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>
                <style>body{font-family: Arial, sans-serif; padding: 1rem;}</style>
                ${html}
            `;
            document.getElementById('previewIframe').srcdoc = previewHTML;
        });
    });
}

function openHTMLEditor(id) {
    currentActionId = id;
    const ws = allWorksheets.find(w => w.id === id);
    document.getElementById('htmlModal').classList.add('active');
    
    if(!monacoEditorInstance) {
        initMonaco();
        setTimeout(() => { monacoEditorInstance.setValue(ws.worksheetHTML || ''); }, 1000);
    } else {
        monacoEditorInstance.setValue(ws.worksheetHTML || '');
    }
}

// Auto Question Count Logic
function autoCountQuestions(htmlStr) {
    // Basic DOM parsing rule based on common structural tags or text
    let count = 0;
    // Count common list item prefixes or bold question tags (e.g. "Q1.", "1.", "Question 1")
    const matches = htmlStr.match(/>(\s*Q\d+|\s*\d+\.)/gi);
    if(matches) count = matches.length;
    
    // Fallback: count list elements if unordered/ordered lists are used for questions
    if(count === 0) {
        const liMatches = htmlStr.match(/<li[^>]*>/gi);
        if(liMatches) count = liMatches.length;
    }
    return count;
}

async function saveHTML() {
    const newHTML = monacoEditorInstance.getValue();
    const calcTotal = autoCountQuestions(newHTML);
    const oldData = allWorksheets.find(w => w.id === currentActionId);
    
    const newData = {
        worksheetHTML: newHTML,
        totalQuestions: calcTotal,
        updatedAt: new Date().toISOString(),
        updatedBy: auth.currentUser.email
    };

    try {
        await saveHistory(currentActionId, oldData, newData);
        await db.collection('worksheets').doc(currentActionId).update(newData);
        showToast(`HTML Saved! Auto-counted ${calcTotal} questions.`);
        closeModal('htmlModal');
    } catch(err) { showToast(err.message, 'error'); }
}

// --- CSV EXPORT ---
function exportCSV() {
    let csv = "ID,Title,Chapter,Board,Class,Difficulty,Total_Q,Status,Generator\n";
    allWorksheets.forEach(w => {
        csv += `${w.id},"${w.title||''}","${w.chapter||''}","${w.board||''}","${w.className||''}",${w.difficulty||''},${w.totalQuestions||0},${w.status||''},"${w.generator||''}"\n`;
    });
    const link = document.createElement("a");
    link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
    link.download = "worksheets_export.csv";
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
}
