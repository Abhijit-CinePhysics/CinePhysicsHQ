<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CinePhysicsHQ Admin Panel - Manage and approve student-generated worksheets">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>CinePhysicsHQ Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #0f1424;
            --surface2: #141d33;
            --border: #1e2f47;
            --accent: #00d4ff;
            --accent-warm: #ff9d00;
            --accent-alt: #7c3aed;
            --text: #e2eaf5;
            --text-muted: #5a7a99;
            --success: #00e5a0;
            --danger: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* LOADING OVERLAY */
        #initialLoader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        
        #initialLoader h2 {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: none; /* Hidden by default, shown by JS */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #141d33 100%);
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.1);
        }

        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: #ff8888;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logout-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .admin-info {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        /* WORKSHEETS GRID */
        .worksheets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .worksheet-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s;
        }

        .worksheet-card:hover {
            border-color: var(--accent);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.1);
        }

        .worksheet-header {
            margin-bottom: 1.5rem;
        }

        .worksheet-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .worksheet-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pending {
            background: rgba(255, 157, 0, 0.2);
            color: var(--accent-warm);
            border: 1px solid var(--accent-warm);
        }

        .status-approved {
            background: rgba(0, 229, 160, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .worksheet-details {
            margin: 1.5rem 0;
            padding: 1rem;
            background: var(--surface2);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .detail-row span:first-child {
            color: var(--text-muted);
        }

        .worksheet-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-approve, .btn-reject {
            flex: 1;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-approve {
            background: rgba(0, 229, 160, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .btn-approve:hover {
            background: var(--success);
            color: var(--bg);
        }

        .btn-reject {
            background: rgba(255, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-reject:hover {
            background: var(--danger);
            color: white;
        }

        .btn-approve:disabled, .btn-reject:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .worksheets-container {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div id="initialLoader">
    <h2>⚡ CinePhysicsHQ</h2>
    <p style="color: var(--text-muted);">Verifying session...</p>
</div>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>⚡ CinePhysicsHQ</h1>
        <p>Admin Panel</p>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="your@email.com" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••" 
                    required
                >
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Login as Admin</button>
        </form>
    </div>
</div>

<div id="dashboard" class="dashboard">
    <div class="container">
        <div class="header">
            <div>
                <h1>Admin Dashboard</h1>
                <div class="admin-info">
                    Logged in as: <span id="adminEmail"></span>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="statPending">0</div>
                <div class="stat-label">Pending Review</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statApproved">0</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total Worksheets</div>
            </div>
        </div>

        <div class="loading" id="loadingState" style="display: none;">
            Loading worksheets... ⏳
        </div>

        <div id="worksheetsContainer" class="worksheets-container"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📭</div>
            <h2>No worksheets yet</h2>
            <p>Students will submit their generated worksheets here for your approval.</p>
        </div>
    </div>
</div>

<script>
// ==========================================
// CONFIGURATION
// ==========================================
const API_BASE = "https://cinephysics-api.vercel.app/api/admin/admin"; 

// DOM Elements
const initialLoader = document.getElementById('initialLoader');
const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const loginForm = document.getElementById('loginForm');
const logoutBtn = document.getElementById('logoutBtn');
const errorMessage = document.getElementById('errorMessage');
const adminEmail = document.getElementById('adminEmail');
const worksheetsContainer = document.getElementById('worksheetsContainer');
const emptyState = document.getElementById('emptyState');
const loadingState = document.getElementById('loadingState');

// ==========================================
// CUSTOM FETCH WRAPPER (Auto-Logout on 401)
// ==========================================
async function apiFetch(url, options = {}) {
    const response = await fetch(url, {
        credentials: "include",
        ...options
    });

    if (response.status === 401) {
        showLoginScreen();
        throw new Error("Unauthorized: Session expired or invalid.");
    }

    return response;
}

// ==========================================
// SESSION MANAGEMENT & UI STATE
// ==========================================

// Check session on initial load
window.addEventListener('DOMContentLoaded', async () => {
    await verifySession();
    
    // Hide the initial loader once the first check is done
    initialLoader.style.display = 'none';
    
    // Call verifySession() every 5 minutes (300000 ms)
    setInterval(verifySession, 5 * 60 * 1000);
});

// Dedicated session verification function
async function verifySession() {
    try {
        const response = await apiFetch(`${API_BASE}?action=session`);
        const sessionData = await response.json();
        
        if (sessionData.authenticated) {
            showDashboard(sessionData.email);
            return true;
        } else {
            showLoginScreen();
            return false;
        }
    } catch (error) {
        // apiFetch already triggers showLoginScreen() on 401
        showLoginScreen();
        return false;
    }
}

function showDashboard(email) {
    loginScreen.style.display = "none";
    dashboard.classList.add("active");
    adminEmail.textContent = email;
    loadWorksheets();
    loadStats();
}

function showLoginScreen() {
    loginScreen.style.display = "flex";
    dashboard.classList.remove("active");
    loginForm.reset();
    worksheetsContainer.innerHTML = '';
    adminEmail.textContent = ''; 
}

// ==========================================
// AUTHENTICATION HANDLERS
// ==========================================

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';
    errorMessage.classList.remove('show');
    
    try {
        // We use standard fetch here because a 401 on login is a standard rejection, 
        // not an expired session that needs to reset the UI via apiFetch.
        const response = await fetch(`${API_BASE}?action=login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
            credentials: 'include'
        });

        const data = await response.json();

        if (data.success === true) {
            // Guarantee the cookie was actually set by checking the session endpoint immediately
            const isValid = await verifySession();
            if (!isValid) {
                throw new Error("Cookie was not set correctly.");
            }
        } else {
            errorMessage.textContent = '❌ ' + (data.error || data.message || 'Login failed.');
            errorMessage.classList.add('show');
        }
    } catch (error) {
        errorMessage.textContent = '❌ Network error or invalid session. Please try again.';
        errorMessage.classList.add('show');
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login as Admin';
    }
});

logoutBtn.addEventListener('click', async () => {
    try {
        await apiFetch(`${API_BASE}?action=logout`, { 
            method: 'POST'
        });
        showLoginScreen();
    } catch (error) {
        console.error('Logout error:', error);
        // Fallback locally just in case
        showLoginScreen();
    }
});

// ==========================================
// DATA FETCHING & RENDERING
// ==========================================

async function loadWorksheets() {
    loadingState.style.display = 'block';
    worksheetsContainer.innerHTML = '';
    emptyState.style.display = 'none';
    
    try {
        // Using our new wrapper
        const response = await apiFetch(`${API_BASE}?action=pending`);
        const data = await response.json();

        const worksheets = data.worksheets || [];
        
        if (worksheets.length === 0) {
            emptyState.style.display = 'block';
        } else {
            worksheets.forEach(ws => {
                worksheetsContainer.appendChild(createWorksheetCard(ws));
            });
        }
    } catch (error) {
        console.error('Error loading worksheets:', error);
    } finally {
        loadingState.style.display = 'none';
    }
}

async function loadStats() {
    try {
        // Using our new wrapper
        const response = await apiFetch(`${API_BASE}?action=stats`);
        const data = await response.json();

        if (data.success) {
            document.getElementById('statPending').textContent = data.pending || 0;
            document.getElementById('statApproved').textContent = data.approved || 0;
            document.getElementById('statTotal').textContent = data.total || 0;
        }
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

function createWorksheetCard(ws) {
    const card = document.createElement('div');
    card.className = 'worksheet-card';
    
    card.innerHTML = `
        <div class="worksheet-header">
            <h3 class="worksheet-title">${ws.title || 'Untitled'}</h3>
            <div class="worksheet-meta">
                <span class="status-badge status-pending">⏳ ${ws.status}</span>
                <span>${ws.difficulty || 'N/A'}</span>
            </div>
        </div>
        <div class="worksheet-details">
            <div class="detail-row"><span>Class:</span><span>${ws.className || 'N/A'}</span></div>
            <div class="detail-row"><span>Chapter:</span><span>${ws.chapter || 'N/A'}</span></div>
            <div class="detail-row"><span>Questions:</span><span>${ws.questionCount || 0}</span></div>
        </div>
        <div class="worksheet-actions">
            <button class="btn-approve" onclick="handleAction('approve', '${ws.worksheetId}')">✓ Approve</button>
            <button class="btn-reject" onclick="handleAction('reject', '${ws.worksheetId}')">✕ Reject</button>
        </div>
        <div style="margin-top: 1rem; text-align: center;">
             <button class="logout-btn" style="width: 100%; border-color: var(--danger); color: var(--danger);" onclick="handleAction('delete', '${ws.worksheetId}')">🗑️ Delete</button>
        </div>
    `;
    return card;
}

// ==========================================
// ACTIONS
// ==========================================

async function handleAction(action, worksheetId) {
    const confirmation = confirm(`Are you sure you want to ${action} this?`);
    if (!confirmation) return;

    try {
        // Using our new wrapper
        const response = await apiFetch(`${API_BASE}?action=${action}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ worksheetId })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            loadWorksheets();
            loadStats();
        } else {
            alert(data.error || data.message || "Operation failed.");
        }
    } catch (error) {
        // Suppress alert if it's just the Unauthorized error kicking them out
        if(error.message !== "Unauthorized: Session expired or invalid.") {
            alert('Error: ' + error.message);
        }
    }
}
</script>

</body>
</html>
