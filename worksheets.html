<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R41EJ3144X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R41EJ3144X');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dynamic Physics Worksheets Library for Class 11 and 12">
    <title>CinePhysics Worksheets</title>

    <link rel="stylesheet" href="style.css?v=5">

    <style>
        /* CSS Variables */
        :root {
            --lib-bg-color: #0a0a0a;
            --lib-card-bg: rgba(25, 25, 25, 0.6);
            --lib-card-border: rgba(212, 160, 23, 0.2);
            --lib-gold: #d4a017;
            --lib-gold-hover: #b58812;
            --lib-text: #ffffff;
            --lib-text-muted: #a0a0a0;
            --lib-transition: all 0.3s ease;
        }

        .library-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: var(--lib-text);
        }

        /* Controls */
        .library-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: var(--lib-card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--lib-card-border);
        }

        .library-controls input, 
        .library-controls select {
            flex: 1;
            min-width: 180px;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--lib-card-border);
            color: var(--lib-text);
            outline: none;
            transition: var(--lib-transition);
        }

        .library-controls input:focus, 
        .library-controls select:focus {
            border-color: var(--lib-gold);
            box-shadow: 0 0 8px rgba(212, 160, 23, 0.3);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        #worksheet-count {
            color: var(--lib-text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .sync-badge {
            font-size: 0.75rem;
            color: #a0a0a0;
            display: none;
        }

        .btn-clear {
            background: transparent;
            color: var(--lib-gold);
            border: 1px solid var(--lib-card-border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--lib-transition);
        }

        .btn-clear:hover {
            border-color: var(--lib-gold);
            background: rgba(212, 160, 23, 0.1);
        }

        /* Grid & Cards */
        .worksheet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .worksheet-card {
            display: flex;
            flex-direction: column;
            background: var(--lib-card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--lib-card-border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: var(--lib-transition);
            opacity: 0; 
            transform: translateY(15px);
        }

        .worksheet-card.animate {
            animation: fadeUp 0.5s ease-out forwards;
        }

        .worksheet-card:hover {
            transform: translateY(-5px);
            border-color: var(--lib-gold);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--lib-gold);
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .card-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--lib-text-muted);
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stat-stars { color: var(--lib-gold); letter-spacing: 2px; }

        .card-topics {
            font-size: 0.8rem;
            color: var(--lib-gold);
            opacity: 0.8;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .card-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--lib-text-muted);
            margin-bottom: 1.5rem;
        }

        .card-meta-grid span strong {
            color: var(--lib-text);
            font-weight: 500;
        }

        .btn-launch {
            display: inline-block;
            margin-top: auto;
            padding: 0.8rem 1.5rem;
            background-color: var(--lib-gold);
            color: #000;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            border-radius: 8px;
            transition: var(--lib-transition);
        }

        .btn-launch:hover {
            background-color: var(--lib-gold-hover);
            box-shadow: 0 4px 12px rgba(212, 160, 23, 0.3);
        }

        /* Pagination Controls */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.3rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .page-btn {
            background: var(--lib-card-bg);
            color: var(--lib-text);
            border: 1px solid var(--lib-card-border);
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--lib-transition);
            font-family: inherit;
        }

        .page-btn:hover:not(:disabled):not(.dots) { background: rgba(212, 160, 23, 0.1); border-color: var(--lib-gold); }
        .page-btn.active { background: var(--lib-gold); color: #000; border-color: var(--lib-gold); font-weight: bold; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .page-btn.dots { background: transparent; border: none; cursor: default; padding: 0.5rem 0.2rem; }

        /* States & Skeletons */
        .state-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--lib-card-bg);
            border-radius: 12px;
            border: 1px dashed var(--lib-card-border);
            color: var(--lib-text-muted);
            font-size: 1.2rem;
        }
        
        .btn-retry { margin-top: 1rem; padding: 0.6rem 1.2rem; background: transparent; color: var(--lib-gold); border: 1px solid var(--lib-gold); border-radius: 8px; cursor: pointer; transition: var(--lib-transition); }
        .btn-retry:hover { background: rgba(212, 160, 23, 0.1); }

        .skeleton {
            background: linear-gradient(90deg, rgba(25,25,25,0.6) 0%, rgba(40,40,40,0.8) 50%, rgba(25,25,25,0.6) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
            min-height: 280px;
            border: 1px solid var(--lib-card-border);
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Accessibility: Prefers Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            .worksheet-card {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
            .skeleton {
                animation: none;
                background: var(--lib-card-bg);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>CinePhysics Worksheets</h1>
    </header>

    <nav aria-label="Main Navigation">
        <a href="index.html">Home</a>
        <a href="worksheets.html" aria-current="page">Worksheets</a>
        <a href="questionbanks.html">Question Banks</a>
        <a href="class11.html">Class 11</a>
        <a href="class12.html">Class 12</a>
        <a href="about.html">About</a>
    </nav>

    <main class="library-container">
        
        <div class="library-controls" role="search" aria-label="Worksheet filtering">
            <input type="text" id="lib-search" aria-label="Search worksheets" placeholder="Search title, chapter, or topics...">
            
            <select id="lib-filter-class" aria-label="Filter by class">
                <option value="">All Classes</option>
                <option value="Class 11">Class 11</option>
                <option value="Class 12">Class 12</option>
            </select>

            <select id="lib-filter-difficulty" aria-label="Filter by difficulty">
                <option value="">All Difficulties</option>
                <option value="Basic">Basic</option>
                <option value="Moderate">Moderate</option>
                <option value="Advanced">Advanced</option>
                <option value="Mixed (Board Level)">Mixed (Board Level)</option>
            </select>

            <select id="lib-sort" aria-label="Sort worksheets">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="az">Title A-Z</option>
                <option value="class">Class Grouping</option>
                <option value="difficulty">Difficulty</option>
                <option value="chapter">Chapter</option>
                <option value="questions">Highest Questions</option>
            </select>
        </div>

        <div class="results-header">
            <div id="worksheet-count" aria-live="polite">
                <span>Loading worksheets...</span>
                <span id="sync-badge" class="sync-badge" aria-hidden="true">(Syncing...)</span>
            </div>
            <button id="btn-clear" class="btn-clear" aria-label="Clear all filters">Clear Filters</button>
        </div>

        <div id="worksheet-grid" class="worksheet-grid" aria-live="polite"></div>
        
        <nav id="pagination-controls" class="pagination" aria-label="Pagination Navigation"></nav>

    </main>

    <script>
        /**
         * Global State
         */
        let allWorksheets = [];
        let filteredWorksheets = [];
        
        let currentPage = 1;
        const ITEMS_PER_PAGE = 20;

        // Intl.Collator for natural numeric string sorting (e.g., Worksheet 2 before Worksheet 10)
        const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });

        /**
         * DOM Elements
         */
        const DOM = {
            grid: document.getElementById('worksheet-grid'),
            pagination: document.getElementById('pagination-controls'),
            search: document.getElementById('lib-search'),
            filterClass: document.getElementById('lib-filter-class'),
            filterDiff: document.getElementById('lib-filter-difficulty'),
            sort: document.getElementById('lib-sort'),
            count: document.getElementById('worksheet-count').firstElementChild,
            syncBadge: document.getElementById('sync-badge'),
            btnClear: document.getElementById('btn-clear')
        };

        /**
         * API Configuration
         */
        const API_BASE = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000/api"
            : "https://cinephysics-api.vercel.app/api";
        const API_URL = `${API_BASE}/worksheets`;

        /**
         * Utilities
         */
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return isNaN(date) ? 'N/A' : date.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function debounce(fn, delay = 300) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getStars(rating) {
            const r = Math.round(Math.max(0, Math.min(5, rating)));
            return '★'.repeat(r) + '☆'.repeat(5 - r);
        }

        /**
         * URL State Management
         */
        function readURLParams() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('search')) DOM.search.value = params.get('search');
            if (params.has('class')) DOM.filterClass.value = params.get('class');
            if (params.has('diff')) DOM.filterDiff.value = params.get('diff');
            if (params.has('sort')) DOM.sort.value = params.get('sort');
            if (params.has('page')) currentPage = parseInt(params.get('page')) || 1;
        }

        function updateURLParams() {
            const params = new URLSearchParams();
            if (DOM.search.value) params.set('search', DOM.search.value);
            if (DOM.filterClass.value) params.set('class', DOM.filterClass.value);
            if (DOM.filterDiff.value) params.set('diff', DOM.filterDiff.value);
            if (DOM.sort.value !== 'newest') params.set('sort', DOM.sort.value);
            if (currentPage > 1) params.set('page', currentPage);
            
            const newUrl = `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
            window.history.replaceState(null, '', newUrl);
        }

        /**
         * IntersectionObserver for Lazy-loading animations
         */
        const cardObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate');
                    observer.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.1, rootMargin: "0px 0px 50px 0px" });

        /**
         * UI State Managers
         */
        function showLoading() {
            DOM.count.textContent = 'Loading worksheets...';
            DOM.pagination.innerHTML = '';
            DOM.grid.innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');
        }

        function showEmpty() {
            DOM.grid.innerHTML = `
                <div class="state-message">
                    No worksheets available matching your criteria.
                </div>
            `;
            DOM.pagination.innerHTML = '';
        }

        function showError() {
            DOM.count.textContent = 'Error loading data';
            DOM.grid.innerHTML = `
                <div class="state-message" style="border-color: #ff4d4d; color: #ff4d4d;">
                    Unable to load worksheets. Please check your connection.
                    <br>
                    <button class="btn-retry" id="btn-retry">Try Again</button>
                </div>
            `;
        }

        /**
         * Fetch Data (Stale-While-Revalidate Pattern)
         */
        async function fetchWorksheets() {
            let hasRenderedCache = false;

            // 1. Instantly paint the UI with cached data if available
            const cached = localStorage.getItem("worksheetCache");
            if (cached) {
                try {
                    const parsedCache = JSON.parse(cached);
                    allWorksheets = parsedCache.worksheets || [];
                    hasRenderedCache = true;
                    applyFilters(false); // Render without overriding URL page param
                    DOM.syncBadge.style.display = 'inline';
                } catch (e) {
                    console.warn("Invalid cache format.");
                }
            }

            if (!hasRenderedCache) showLoading();

            // 2. Fetch fresh data in the background
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("API Error");
                
                const data = await response.json();
                const freshWorksheets = Array.isArray(data?.worksheets) ? data.worksheets : [];
                
                // 3. Compare and silently update if data changed
                if (JSON.stringify(allWorksheets) !== JSON.stringify(freshWorksheets)) {
                    allWorksheets = freshWorksheets;
                    localStorage.setItem("worksheetCache", JSON.stringify({
                        updated: Date.now(),
                        worksheets: allWorksheets
                    }));
                    applyFilters(false); 
                }
                DOM.syncBadge.style.display = 'none';
                
            } catch (error) {
                console.warn("API Fetch failed. Relying on cache.", error);
                DOM.syncBadge.style.display = 'none';
                if (!hasRenderedCache) showError();
            }
        }

        /**
         * Filtering and Sorting Logic
         */
        function applyFilters(resetPage = true) {
            const searchQ = DOM.search.value.toLowerCase();
            const classF = DOM.filterClass.value;
            const diffF = DOM.filterDiff.value;
            const sortSelection = DOM.sort.value;

            filteredWorksheets = allWorksheets.filter(item => {
                const searchStr = `${item.title || ""} ${item.chapter || ""} ${(item.topics || []).join(" ")}`.toLowerCase();
                const matchesSearch = searchStr.includes(searchQ);
                const matchesClass = classF ? String(item.className) === classF : true;
                const matchesDiff = diffF ? (item.difficulty || '').toLowerCase() === diffF.toLowerCase() : true;
                return matchesSearch && matchesClass && matchesDiff;
            });

            // Natural Sorting via Intl.Collator
            filteredWorksheets.sort((a, b) => {
                if (sortSelection === 'newest') return new Date(b.generatedAt) - new Date(a.generatedAt);
                if (sortSelection === 'oldest') return new Date(a.generatedAt) - new Date(b.generatedAt);
                if (sortSelection === 'az') return collator.compare(a.title || "", b.title || "");
                if (sortSelection === 'class') return collator.compare(String(a.className || ""), String(b.className || ""));
                if (sortSelection === 'difficulty') return collator.compare(a.difficulty || "", b.difficulty || "");
                if (sortSelection === 'chapter') return collator.compare(a.chapter || "", b.chapter || "");
                if (sortSelection === 'questions') return (b.questionCount || 0) - (a.questionCount || 0);
                return 0;
            });

            DOM.count.textContent = `${filteredWorksheets.length} worksheet(s) found`;
            
            if (resetPage) currentPage = 1; 
            updateURLParams();
            renderPage();
        }

        /**
         * Render Grid
         */
        function renderPage() {
            if (filteredWorksheets.length === 0) {
                showEmpty();
                return;
            }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const toRender = filteredWorksheets.slice(startIndex, startIndex + ITEMS_PER_PAGE);
            
            const fragment = document.createDocumentFragment();
            cardObserver.disconnect();

            toRender.forEach(sheet => {
                const safeTitle = escapeHTML(sheet.title || 'Untitled Worksheet');
                const safeClass = escapeHTML(sheet.className || '-');
                const safeChapter = escapeHTML(sheet.chapter || '-');
                const safeDifficulty = escapeHTML(sheet.difficulty || '-');
                const safeBoard = escapeHTML(sheet.board || '-');
                const safeId = encodeURIComponent(sheet.worksheetId);
                
                const topicsArray = Array.isArray(sheet.topics) ? sheet.topics : [];
                const safeTopicsHtml = topicsArray.length > 0 ? `<div class="card-topics">${escapeHTML(topicsArray.join(', '))}</div>` : '';
                
                const rating = sheet.rating || 0;
                const starsHtml = getStars(rating);
                const views = sheet.views || 0;
                const downloads = sheet.downloads || 0;
                const likes = sheet.likes || 0;

                const card = document.createElement('div');
                card.className = 'worksheet-card';
                card.innerHTML = `
                    <h3 class="card-title">${safeTitle}</h3>
                    
                    <div class="card-stats">
                        <span class="stat-stars" title="Rating: ${rating}/5" aria-label="Rating ${rating} out of 5 stars">${starsHtml}</span>
                        <span title="Views" aria-label="${views} Views">👁 ${views}</span>
                        <span title="Downloads" aria-label="${downloads} Downloads">📥 ${downloads}</span>
                        <span title="Likes" aria-label="${likes} Likes">❤️ ${likes}</span>
                    </div>

                    ${safeTopicsHtml}
                    
                    <div class="card-meta-grid">
                        <span><strong>Class:</strong> ${safeClass}</span>
                        <span><strong>Chapter:</strong> ${safeChapter}</span>
                        <span><strong>Difficulty:</strong> ${safeDifficulty}</span>
                        <span><strong>Board:</strong> ${safeBoard}</span>
                        <span><strong>Questions:</strong> ${sheet.questionCount || 0}</span>
                        <span><strong>Added:</strong> ${formatDate(sheet.generatedAt)}</span>
                    </div>

                    <a href="worksheet.html?id=${safeId}" class="btn-launch" data-id="${safeId}" data-title="${safeTitle}" aria-label="Open ${safeTitle}">
                        Open Worksheet →
                    </a>
                `;
                
                cardObserver.observe(card);
                fragment.appendChild(card);
            });

            DOM.grid.innerHTML = '';
            DOM.grid.appendChild(fragment);
            
            renderPaginationControls();
        }

        /**
         * Pagination Logic
         */
        function getPaginationRange(current, total) {
            const delta = 2; 
            const range = [];
            for (let i = Math.max(2, current - delta); i <= Math.min(total - 1, current + delta); i++) range.push(i);
            if (current - delta > 2) range.unshift("...");
            if (current + delta < total - 1) range.push("...");
            range.unshift(1); 
            if (total > 1) range.push(total); 
            return range;
        }

        function renderPaginationControls() {
            const totalPages = Math.ceil(filteredWorksheets.length / ITEMS_PER_PAGE);
            DOM.pagination.innerHTML = '';
            if (totalPages <= 1) return; 

            const frag = document.createDocumentFragment();

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = '« Prev';
            prevBtn.disabled = currentPage === 1;
            prevBtn.setAttribute('aria-label', 'Previous page');
            prevBtn.addEventListener('click', () => { 
                currentPage--; applyFilters(false); window.scrollTo({ top: 0, behavior: 'smooth' }); 
            });
            frag.appendChild(prevBtn);

            const pageRange = getPaginationRange(currentPage, totalPages);
            pageRange.forEach(page => {
                const btn = document.createElement('button');
                if (page === "...") {
                    btn.className = 'page-btn dots';
                    btn.textContent = '...';
                    btn.disabled = true;
                    btn.setAttribute('aria-hidden', 'true');
                } else {
                    btn.className = `page-btn ${page === currentPage ? 'active' : ''}`;
                    btn.textContent = page;
                    btn.setAttribute('aria-label', `Page ${page}`);
                    btn.addEventListener('click', () => { 
                        currentPage = page; applyFilters(false); window.scrollTo({ top: 0, behavior: 'smooth' }); 
                    });
                }
                frag.appendChild(btn);
            });

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = 'Next »';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.setAttribute('aria-label', 'Next page');
            nextBtn.addEventListener('click', () => { 
                currentPage++; applyFilters(false); window.scrollTo({ top: 0, behavior: 'smooth' }); 
            });
            frag.appendChild(nextBtn);

            DOM.pagination.appendChild(frag);
        }

        /**
         * Initialization & Events
         */
        function initLibrary() {
            // Read URL State on load
            readURLParams();

            // Bind Events
            const filterHandler = debounce(() => applyFilters(true), 300);
            DOM.search.addEventListener('input', filterHandler);
            DOM.filterClass.addEventListener('change', filterHandler);
            DOM.filterDiff.addEventListener('change', filterHandler);
            DOM.sort.addEventListener('change', filterHandler);

            DOM.btnClear.addEventListener('click', () => {
                DOM.search.value = '';
                DOM.filterClass.value = '';
                DOM.filterDiff.value = '';
                DOM.sort.value = 'newest';
                applyFilters(true);
            });

            // Analytics Tracking & Retry Event Delegation
            DOM.grid.addEventListener('click', (e) => {
                if (e.target && e.target.id === 'btn-retry') {
                    fetchWorksheets();
                    return;
                }
                
                const btn = e.target.closest('.btn-launch');
                if (btn && typeof gtag === 'function') {
                    gtag('event', 'worksheet_open', { 
                        worksheet_id: btn.dataset.id, 
                        worksheet_title: btn.dataset.title 
                    });
                }
            });

            // Listen to browser Back/Forward navigation
            window.addEventListener('popstate', () => {
                readURLParams();
                applyFilters(false);
            });

            fetchWorksheets();
        }

        document.addEventListener('DOMContentLoaded', initLibrary);

    </script>
</body>
</html>
