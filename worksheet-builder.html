<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R41EJ3144X"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePhysicsHQ AI Teacher Dashboard</title>

    <style>
        :root {
            --bg-base: #0b0b0b;
            --bg-card: #111111;
            --gold-accent: #d4a017;
            --gold-bright: #f5c242;
            --text-primary: #ffffff;
            --text-secondary: #b8b8b8;
            --glass-bg: rgba(17, 17, 17, 0.6);
            --glass-border: rgba(212, 160, 23, 0.15);
            --glass-blur: blur(12px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; }

        nav {
            display: flex; justify-content: center; gap: 2rem; padding: 1.5rem;
            background: rgba(11, 11, 11, 0.9); backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 100;
        }
        nav a { color: var(--text-secondary); text-decoration: none; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;}
        nav a.active { color: var(--gold-bright); }

        .hero {
            min-height: 30vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem;
            background: linear-gradient(to bottom, rgba(11, 11, 11, 0.7), rgba(11, 11, 11, 1)), url('banner.jpg') center/cover;
            border-bottom: 1px solid var(--glass-border);
        }

        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        .chapter-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; backdrop-filter: var(--glass-blur); }
        .chapter-card h3 { color: var(--gold-bright); margin-bottom: 1.2rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; font-size: 1rem; }

        label { color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; display: block; margin-top: 10px; }
        input, select, textarea {
            width: 100%; padding: 0.75rem; margin-top: 5px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-primary); border-radius: 4px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .btn { padding: 0.8rem 1.5rem; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; border: none; width: 100%; }
        .btn-primary { background: var(--gold-accent); color: #000; font-size: 1rem; margin-top: 20px; box-shadow: 0 0 20px rgba(212, 160, 23, 0.2); }
        .btn-primary:hover { background: var(--gold-bright); transform: translateY(-2px); }

        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .analytics-box { background: rgba(0,0,0,0.3); padding: 10px; border-left: 3px solid var(--gold-accent); margin-top: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <h2 style="color: var(--gold-bright); margin-bottom: 10px;">CinePhysics AI is generating...</h2>
        <p style="color: white;">Crafting high-quality physics questions.</p>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="worksheet-builder.html" class="active">AI Builder</a>
        <a href="import.html">PDF Exporter</a>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 style="font-size: 2.5rem;">AI Worksheet Builder</h1>
            <p style="color: var(--gold-accent); letter-spacing: 2px;">PREMIUM TEACHER TOOLS</p>
        </div>
    </header>

    <div class="container">
        <!-- 1. API & Class -->
        <div class="chapter-card">
            <h3>1. Curriculum & API</h3>
            <label>Gemini API Key</label>
            <input type="password" id="apiKey" value="AQ.Ab8RN6JoDMs3PpjCn8zfSWNzfDAA0vodBvgWAJ09HUNLxNbaPg">
            
            <div class="grid-2">
                <div>
                    <label>Class</label>
                    <select id="classSelect" onchange="loadChapters()">
                        <option value="Class 11">Class 11</option>
                        <option value="Class 12">Class 12</option>
                    </select>
                </div>
                <div>
                    <label>Chapter</label>
                    <input list="chapterList" id="chapterSearch" placeholder="Select Chapter..." onchange="loadTopics()">
                    <datalist id="chapterList"></datalist>
                </div>
            </div>
        </div>

        <!-- 2. Topics -->
        <div class="chapter-card">
            <h3>2. Selected Topics</h3>
            <div id="topicsContainer" style="font-size: 0.85rem; color: var(--text-secondary);">Select a chapter first.</div>
        </div>

        <!-- 3. Question Distribution -->
        <div class="chapter-card">
            <h3>3. Question Distribution</h3>
            <div class="grid-3">
                <div><label>MCQ</label><input type="number" id="mcqCount" value="5" min="0"></div>
                <div><label>A-Reason</label><input type="number" id="arCount" value="2" min="0"></div>
                <div><label>VSA (2M)</label><input type="number" id="vsaCount" value="0" min="0"></div>
                <div><label>SA (3M)</label><input type="number" id="saCount" value="3" min="0"></div>
                <div><label>LA (5M)</label><input type="number" id="laCount" value="1" min="0"></div>
                <div><label>Numerical</label><input type="number" id="numCount" value="2" min="0"></div>
            </div>
            <label>Difficulty</label>
            <select id="difficulty">
                <option>Basic</option>
                <option value="Moderate" selected>Moderate</option>
                <option>Advanced</option>
                <option>Mixed (Board Level)</option>
            </select>
        </div>

        <!-- 4. Exam Paper Settings -->
        <div class="chapter-card">
            <h3>4. Exam Paper Generator</h3>
            <label>Paper Title / Header</label>
            <input type="text" id="examTitle" placeholder="e.g. Unit Test: Kinematics">
            <div class="grid-2">
                <div>
                    <label>Time Allowed</label>
                    <select id="examTime">
                        <option>45 Mins</option>
                        <option selected>1 Hour</option>
                        <option>2 Hours</option>
                        <option>3 Hours</option>
                    </select>
                </div>
                <div>
                    <label>Output Mode</label>
                    <select id="outputMode">
                        <option value="student">Student Worksheet</option>
                        <option value="teacher">With Answer Key</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 5. Advanced Toggle -->
        <div class="chapter-card">
            <h3>5. Optional Enhancements</h3>
            <div style="font-size: 0.85rem; color: var(--text-secondary); display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <label><input type="checkbox" id="enhNCERT" checked> NCERT Alignment</label>
                <label><input type="checkbox" id="enhCBSE" checked> CBSE Competency</label>
                <label><input type="checkbox" id="enhRealLife"> Real-life Apps</label>
                <label><input type="checkbox" id="enhHOTS"> HOTS Questions</label>
            </div>
        </div>

        <button class="btn btn-primary" id="btnAISync">✨ Generate AI Worksheet & Export</button>

    </div>

    <script src="chapterData11.js"></script>
    <script src="chapterData12.js"></script>

    <script>
        const chapterDatabase = {
            "Class 11": typeof class11Data !== 'undefined' ? class11Data : {},
            "Class 12": typeof class12Data !== 'undefined' ? class12Data : {}
        };

        function loadChapters() {
            const list = document.getElementById("chapterList");
            list.innerHTML = "";
            const currentClass = document.getElementById("classSelect").value;
            Object.keys(chapterDatabase[currentClass]).forEach(ch => {
                let opt = document.createElement("option"); opt.value = ch; list.appendChild(opt);
            });
        }
        
        function loadTopics() {
            const container = document.getElementById("topicsContainer");
            const currentClass = document.getElementById("classSelect").value;
            const chapter = document.getElementById("chapterSearch").value;
            const topics = chapterDatabase[currentClass][chapter];
            container.innerHTML = "";
            if(!topics) { container.innerHTML = "Select a valid chapter."; return; }
            topics.forEach(t => {
                container.innerHTML += `<label style="display:inline-block; margin-right:15px;"><input type="checkbox" class="topicCheckbox" value="${t}" checked> ${t}</label>`;
            });
        }

        function generatePrompt() {
            const topics = [...document.querySelectorAll(".topicCheckbox:checked")].map(cb => cb.value).join(", ");
            const mcq = document.getElementById("mcqCount").value;
            const ar = document.getElementById("arCount").value;
            const vsa = document.getElementById("vsaCount").value;
            const sa = document.getElementById("saCount").value;
            const la = document.getElementById("laCount").value;
            const num = document.getElementById("numCount").value;
            
            const mode = document.getElementById("outputMode").value;
            const title = document.getElementById("examTitle").value || "Physics Worksheet";
            const time = document.getElementById("examTime").value;

            let prompt = `Act as an expert Physics educator. Create a ${title} for ${document.getElementById("classSelect").value}.
            Chapter: ${document.getElementById("chapterSearch").value}.
            Topics: ${topics}.
            Difficulty: ${document.getElementById("difficulty").value}.
            Time Allowed: ${time}.

            DISTRIBUTION:
            - ${mcq} Multiple Choice Questions
            - ${ar} Assertion-Reason Questions
            - ${vsa} Very Short Answer (2 Marks)
            - ${sa} Short Answer (3 Marks)
            - ${la} Long Answer (5 Marks)
            - ${num} Numericals
            
            ${document.getElementById("enhNCERT").checked ? "- Ensure NCERT alignment." : ""}
            ${document.getElementById("enhCBSE").checked ? "- Focus on CBSE Competency-based patterns." : ""}
            ${document.getElementById("enhHOTS").checked ? "- Include 1-2 HOTS questions." : ""}

            STRICT HTML FORMATTING:
            1. Return ONLY valid HTML fragments. No <html>, <head>, or <body> tags.
            2. Wrap every question in <div class="question-block">.
            3. Use <h3> for Section headers and <h4> for question numbers.
            4. MCQs MUST use <ol type="a"> for options.
            5. Subjective/Numerical questions MUST have 4 <br> tags at the end for spacing.
            6. Units: Use m s<sup>-1</sup>, J s<sup>-1</sup>, etc. (No slashes).
            ${mode === "teacher" ? "7. At the very end, add a <hr> and an <h2>Answer Key</h2> with brief solutions." : ""}`;

            return prompt;
        }

        async function startAI() {
            const key = document.getElementById("apiKey").value;
            const overlay = document.getElementById("loadingOverlay");
            const chapter = document.getElementById("chapterSearch").value;
            
            if(!chapter) { alert("Please select a chapter first!"); return; }
            
            overlay.style.display = "flex";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: generatePrompt() }] }] })
                });

                const data = await response.json();
                let htmlContent = data.candidates[0].content.parts[0].text;
                htmlContent = htmlContent.replace(/```html/g, "").replace(/```/g, "").trim();

                // Save to localStorage
                localStorage.setItem("cp_ai_html", htmlContent);
                localStorage.setItem("cp_ai_topic", document.getElementById("examTitle").value || document.getElementById("chapterSearch").value);
                localStorage.setItem("cp_ai_time", document.getElementById("examTime").value);

                // Redirect
                window.location.href = "import.html";

            } catch (error) {
                console.error(error);
                alert("AI Error. Please check your API Key or try again.");
                overlay.style.display = "none";
            }
        }

        document.getElementById("btnAISync").onclick = startAI;
        window.onload = loadChapters;
    </script>
</body>
</html>
