<style>

#previewAreaWrapper{
    position:relative;
    background:white;
    color:black;
    
    margin-top:20px;
    border:1px solid #ccc;
    border-radius:10px;
    min-height:600px;
    overflow:hidden;
}

#previewArea{
    position:relative;
    z-index:2;
    padding:30px;
}

.worksheet-header{
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

.worksheet-logo{
    width:100px;
    height:auto;
}

.worksheet-banner{
    display:block;

    width:calc(100% + 60px);

    margin-left:-30px;
    margin-right:-30px;
    margin-top:-30px;

    height:auto;
    display:block;

    border-radius:10px 10px 0 0;
}
    
.watermark-grid{
    position:absolute;
    inset:0;

    display:flex;
    flex-wrap:wrap;

    align-content:space-evenly;
    justify-content:space-evenly;

    font-size:60px;
    font-weight:bold;

    color:rgba(0,0,0,0.025);

    transform:rotate(-30deg);

    pointer-events:none;
    user-select:none;

    z-index:1;
}

    .worksheet-footer{
    text-align:center;

    margin-top:40px;
    padding-top:15px;

    border-top:1px solid #ddd;

    font-size:14px;
    color:#666;

    position:relative;
    z-index:2;
    }
</style>

<h1>Worksheet Importer</h1>

<textarea
id="worksheetInput"
rows="20"
style="width:100%;">
</textarea>

<br><br>

<button id="btnPreview">
Preview Worksheet
</button>

<hr>

<div id="previewAreaWrapper">

    <img
        src="/CinePhysicsHQ/banner.jpg"
        class="worksheet-banner"
        alt="CinePhysics Banner">

    <div class="watermark-grid">
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
    </div>

    <div id="previewArea"></div>
<div class="worksheet-footer">
        CinePhysics HQ | Physics Made Visual |
        © 2026 CinePhysics
    </div>

</div>
</div>
    

    
<script>

document
.getElementById("btnPreview")
.addEventListener("click", () => {

    const content =
        document.getElementById("worksheetInput").value;

    document
        .getElementById("previewArea")
        .innerHTML = content;

});

</script>
