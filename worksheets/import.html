<style>

#previewAreaWrapper{
    position:relative;
    background:white;
    color:black;
    padding:30px;
    margin-top:20px;
    border:1px solid #ccc;
    border-radius:10px;
    min-height:600px;
}

#previewArea{
    position:relative;
    z-index:2;
}

.worksheet-header{
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

.worksheet-logo{
    width:100px;
    height:auto;
}

.worksheet-watermark{
    position:absolute;
    top:50%;
    left:50%;

    transform:
        translate(-50%,-50%)
        rotate(-30deg);

    font-size:80px;
    font-weight:bold;

    color:rgba(0,0,0,0.05);

    z-index:1;

    pointer-events:none;
    user-select:none;
}

</style>

<h1>Worksheet Importer</h1>

<textarea
id="worksheetInput"
rows="20"
style="width:100%;">
</textarea>

<br><br>

<button id="btnPreview">
Preview Worksheet
</button>

<hr>

<div id="previewAreaWrapper">

    <div class="worksheet-header">

    <img
src="../logo.png"
class="worksheet-logo"
alt="CinePhysics Logo">

</div>

    <div class="worksheet-watermark">
        CINEPHYSICS
    </div>

    <div id="previewArea"></div>

</div>
<script>

document
.getElementById("btnPreview")
.addEventListener("click", () => {

    const content =
        document.getElementById("worksheetInput").value;

    document
        .getElementById("previewArea")
        .innerHTML = content;

});

</script>
