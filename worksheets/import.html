<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePhysicsHQ Exporter</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --cp-bg: #050505; --cp-panel: #0f0f0f; --cp-border: #222222;
            --cp-gold: #d8a435; --cp-pdf-dark: #0f172a; --cp-pdf-blue: #00bfff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cp-bg); color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: var(--cp-panel); border: 1px solid var(--cp-border); padding: 20px; border-radius: 8px; width: 100%; max-width: 1000px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; border: none; }
        
        /* PDF Preview Container */
        .print-container { background: white; color: black; width: 100%; max-width: 800px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #previewAreaWrapper { position: relative; min-height: 1000px; }
        .banner { width: 100%; display: block; }
        .title-bar { background: linear-gradient(90deg, var(--cp-pdf-dark), var(--cp-pdf-blue)); color: white; padding: 15px 30px; font-size: 22px; font-weight: bold; }
        
        #previewArea { padding: 40px; position: relative; z-index: 2; }
        .meta-box { display: flex; justify-content: space-between; background: #f1f5f9; color: #1e293b; padding: 15px; border: 1px solid #cbd5e1; margin-bottom: 25px; font-size: 14px; }
        
        .question-block { page-break-inside: avoid; margin-bottom: 25px; }
        .question-block h4 { margin-bottom: 5px; color: #1e293b; }
        
        #dynamicContent, #dynamicContent * { color: #000 !important; }
        
        /* Keep watermark in DOM for jsPDF to read, but apply opacity here for the web preview */
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; opacity: 0.015; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="color: var(--cp-gold); margin-bottom: 10px;">PDF Export Preview</h2>
        <p style="font-size: 0.8rem; color: #888;">Review your AI generated worksheet. Click Download to save as PDF.</p>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button class="btn" style="background: var(--cp-gold); color: #000;" onclick="exportPDF()">Download PDF</button>
            <button class="btn" style="background: transparent; color: #888; border: 1px solid #444;" onclick="window.location.href='../worksheet-builder.html'">Back to Builder</button>
        </div>
    </div>

    <div class="print-container">
        <div id="previewAreaWrapper">
            <img src="../logo.png" class="watermark" id="wmImage">
            <img src="../banner.jpg" class="banner">
            <div class="title-bar" id="pdfTitle">CinePhysics Assessment</div>
            
            <div id="previewArea">
                <div class="meta-box">
                    <div><strong>Subject:</strong> Physics</div>
                    <div><strong>Time:</strong> <span id="pdfTime">--</span></div>
                    <div><strong>Max Marks:</strong> <span id="pdfMarks">--</span></div>
                </div>
                
                <div id="dynamicContent"></div>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            let html = localStorage.getItem("cp_ai_html");
            const topic = localStorage.getItem("cp_ai_topic") || "Physics Worksheet";
            const time = localStorage.getItem("cp_ai_time") || "60 Minutes";
            const marks = localStorage.getItem("cp_ai_marks") || "0";

            if(html) {
                html = html.replace(/color:\s*white/gi, "color:black")
                           .replace(/color:\s*#fff/gi, "color:black")
                           .replace(/color:\s*#ffffff/gi, "color:black");

                document.getElementById("dynamicContent").innerHTML = html;
                document.getElementById("pdfTitle").innerText = topic;
                document.getElementById("pdfTime").innerText = time;
                document.getElementById("pdfMarks").innerText = marks;
                
                if (window.MathJax) {
                    MathJax.typesetPromise([document.getElementById('dynamicContent')])
                        .then(() => console.log('MathJax successfully rendered the equations.'))
                        .catch((err) => console.error('MathJax rendering failed: ', err.message));
                }
            } else {
                document.getElementById("dynamicContent").innerHTML = `<p>No content found in storage. Please generate from the builder.</p>`;
            }
        };

        function exportPDF() {
            const element = document.getElementById("previewAreaWrapper");
            const wmImg = document.getElementById("wmImage");
            
            // 1. Hide the CSS watermark so it doesn't double print
            wmImg.style.display = 'none';

            // 2. Prepare the watermark with 0.015 opacity onto a pure Canvas
            const canvas = document.createElement('canvas');
            canvas.width = wmImg.naturalWidth || 800;
            canvas.height = wmImg.naturalHeight || 800;
            const ctx = canvas.getContext('2d');
            ctx.globalAlpha = 0.015; // Set exact opacity here
            ctx.drawImage(wmImg, 0, 0, canvas.width, canvas.height);
            const imgData = canvas.toDataURL('image/png');

            const opt = {
                margin: [0, 0, 15, 0], // Added 15mm bottom margin so questions don't overlap footer
                filename: 'CinePhysics_Worksheet.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'], avoid: '.question-block' }
            };

            // 3. Generate PDF and loop through pages to add repeating elements
            html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
                const totalPages = pdf.internal.getNumberOfPages();
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();

                // Calculate watermark dimensions (140mm wide)
                const wmWidth = 140;
                const wmHeight = (canvas.height / canvas.width) * wmWidth;
                const wmX = (pageWidth - wmWidth) / 2;
                const wmY = (pageHeight - wmHeight) / 2;

                for (let i = 1; i <= totalPages; i++) {
                    pdf.setPage(i);
                    
                    // Add Repeating Watermark Image
                    pdf.addImage(imgData, 'PNG', wmX, wmY, wmWidth, wmHeight);
                    
                    // Add Repeating Footer Text
                    pdf.setFontSize(10);
                    pdf.setTextColor(128, 128, 128); // Gray color
                    const footerText = "Abhijit Singh | CinePhysicsHQ";
                    
                    // Center the footer text
                    const textWidth = pdf.getStringUnitWidth(footerText) * pdf.internal.getFontSize() / pdf.internal.scaleFactor;
                    const textX = (pageWidth - textWidth) / 2;
                    pdf.text(footerText, textX, pageHeight - 8); // 8mm from bottom edge
                    
                    // Optional: Add Page Numbers to the bottom right
                    const pageText = `Page ${i} of ${totalPages}`;
                    const pw = pdf.getStringUnitWidth(pageText) * pdf.internal.getFontSize() / pdf.internal.scaleFactor;
                    pdf.text(pageText, pageWidth - pw - 10, pageHeight - 8); 
                }
            }).save().then(() => {
                // Restore the CSS watermark in the web preview
                wmImg.style.display = 'block';
            });
        }
    </script>
</body>
</html>
