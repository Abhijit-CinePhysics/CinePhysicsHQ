<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePhysicsHQ Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --cp-bg: #050505; --cp-panel: #0f0f0f; --cp-border: #222222;
            --cp-gold: #d8a435; --cp-pdf-dark: #0f172a; --cp-pdf-blue: #00bfff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cp-bg); color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: var(--cp-panel); border: 1px solid var(--cp-border); padding: 20px; border-radius: 8px; width: 100%; max-width: 1000px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; border: none; }
        
        /* PDF Preview Container */
        .print-container { background: white; color: black; width: 100%; max-width: 800px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #previewAreaWrapper { position: relative; min-height: 1000px; }
        .banner { width: 100%; display: block; }
        .title-bar { background: linear-gradient(90deg, var(--cp-pdf-dark), var(--cp-pdf-blue)); color: white; padding: 15px 30px; font-size: 22px; font-weight: bold; }
        
        #previewArea { padding: 40px; position: relative; z-index: 2; }
        .meta-box { display: flex; justify-content: space-between; background: #f1f5f9; padding: 15px; border: 1px solid #cbd5e1; margin-bottom: 25px; font-size: 14px; }
        
        .question-block { page-break-inside: avoid; margin-bottom: 25px; }
        .question-block h4 { margin-bottom: 5px; color: #1e293b; }
        
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; opacity: 0.04; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="color: var(--cp-gold); margin-bottom: 10px;">PDF Export Preview</h2>
        <p style="font-size: 0.8rem; color: #888;">Review your AI generated worksheet. Click Download to save as PDF.</p>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button class="btn" style="background: var(--cp-gold); color: #000;" onclick="exportPDF()">Download PDF</button>
            <button class="btn" style="background: transparent; color: #888; border: 1px solid #444;" onclick="window.location.href='../worksheet-builder.html'">Back to Builder</button>
        </div>
    </div>

    <div class="print-container">
        <div id="previewAreaWrapper">
            <img src="../logo.png" class="watermark">
            <img src="../banner.jpg" class="banner">
            <div class="title-bar" id="pdfTitle">CinePhysics Assessment</div>
            
            <div id="previewArea">
                <div class="meta-box">
                    <div><strong>Subject:</strong> Physics</div>
                    <div><strong>Time:</strong> <span id="pdfTime">--</span></div>
                    <div><strong>Max Marks:</strong> [As Assigned]</div>
                </div>
                
                <div id="dynamicContent">
                    <!-- AI Content Lands Here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const html = localStorage.getItem("cp_ai_html");
            const topic = localStorage.getItem("cp_ai_topic");
            const time = localStorage.getItem("cp_ai_time");

            if(html) {
                document.getElementById("dynamicContent").innerHTML = html;
                document.getElementById("pdfTitle").innerText = topic;
                document.getElementById("pdfTime").innerText = time;
                // localStorage.removeItem("cp_ai_html"); // Keep it for refreshes, clear on builder start
            } else {
                document.getElementById("dynamicContent").innerHTML = "<p>No content found. Please generate from the builder.</p>";
            }
        };

        function exportPDF() {
            const element = document.getElementById("previewAreaWrapper");
            const opt = {
                margin: [0, 0, 10, 0],
                filename: 'CinePhysics_Worksheet.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'], avoid: '.question-block' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
