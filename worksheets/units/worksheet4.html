<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Worksheet 2 | Units and Measurements</title>

<link rel="stylesheet" href="../../style.css?v=5">
    <style>

#previewAreaWrapper{
    position:relative;
    background:white;
    color:black;
    
    margin-top:20px;
    border:1px solid #ccc;
    border-radius:10px;
    min-height:600px;
    overflow:hidden;
}

#previewArea{
    position:relative;
    z-index:2;
    padding:30px;
}

.worksheet-header{
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
}

.worksheet-logo{
    width:100px;
    height:auto;
}

.worksheet-banner{
    display:block;

    width:calc(100% + 60px);

    margin-left:-30px;
    margin-right:-30px;
    margin-top:-30px;

    height:auto;
    display:block;

    border-radius:10px 10px 0 0;
}
    
.watermark-grid{
    position:absolute;
    inset:0;

    display:flex;
    flex-wrap:wrap;

    align-content:space-evenly;
    justify-content:space-evenly;

    font-size:60px;
    font-weight:bold;

    color:rgba(0,0,0,0.025);

    transform:rotate(-30deg);

    pointer-events:none;
    user-select:none;

    z-index:1;
}

    .worksheet-footer{
    text-align:center;

    margin-top:40px;
    padding-top:15px;

    border-top:1px solid #ddd;

    font-size:14px;
    color:#666;

    position:relative;
    z-index:2;
    }

    @media print{

    .worksheet-banner{
        height:140px;
    }

    h1,h2{
        page-break-after:avoid;
    }

    ol{
        page-break-inside:avoid;
    }
    }
    </style>

</head>
<body>
<div id="previewAreaWrapper">

    <img
        src="/CinePhysics/banner.jpg"
        class="worksheet-banner"
        alt="CinePhysics Banner">

    <div class="watermark-grid">
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
        CINEPHYSICS CINEPHYSICS CINEPHYSICS
    </div>

    <div id="worksheetContent">

  






    </div>

    <div class="worksheet-footer">
        CinePhysics HQ • Physics Made Visual
    </div>

</div>

</body>
</html>
